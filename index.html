<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Dice Prophet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        @font-face {
            font-family: 'PressStart2P';
            src: url('https://fonts.gstatic.com/s/pressstart2p/v14/e3t4euO8T-267oIAQAu6jDQyK3nVivNm4I81.woff2') format('woff2');
        }
        body {
            font-family: 'PressStart2P', cursive;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #root {
            max-width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pixel-art {
            image-rendering: pixelated;
        }
        .blink {
            animation: blink 1s steps(2, start) infinite;
        }
        @keyframes blink {
            to {
                visibility: hidden;
            }
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useReducer } = React;
        const tg = window.Telegram.WebApp;

        // Sound effects
        const useSound = () => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const playSound = (frequency, duration) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            };

            return {
                playRoll: () => playSound(330, 0.1),
                playCorrect: () => {
                    playSound(660, 0.1);
                    setTimeout(() => playSound(880, 0.1), 100);
                },
                playIncorrect: () => {
                    playSound(220, 0.1);
                    setTimeout(() => playSound(165, 0.1), 100);
                },
                playBonus: () => {
                    playSound(440, 0.05);
                    setTimeout(() => playSound(880, 0.05), 50);
                    setTimeout(() => playSound(1320, 0.05), 100);
                }
            };
        };

        // Game reducer
        const gameReducer = (state, action) => {
            switch (action.type) {
                case 'START_GAME':
                    return { ...initialState, gameState: 'playing', highScore: state.highScore };
                case 'ROLL_DICE':
                    return {
                        ...state,
                        dice1: action.dice1,
                        dice2: action.dice2,
                        lastRollSum: action.dice1 + action.dice2,
                        isRolling: false,
                    };
                case 'UPDATE_SCORE':
                    return {
                        ...state,
                        score: action.newScore,
                        streak: action.newStreak,
                        doublePointsRolls: Math.max(0, state.doublePointsRolls - 1),
                    };
                case 'ACTIVATE_DOUBLE_POINTS':
                    return { ...state, doublePointsRolls: 3 };
                case 'USE_SECOND_CHANCE':
                    return { ...state, secondChanceUsed: true };
                case 'UPDATE_HIGH_SCORE':
                    return { ...state, highScore: action.highScore };
                case 'GAME_OVER':
                    return { ...state, gameState: 'gameOver' };
                default:
                    return state;
            }
        };

        const initialState = {
            dice1: 1,
            dice2: 1,
            score: 0,
            highScore: 0,
            streak: 0,
            doublePointsRolls: 0,
            secondChanceUsed: false,
            gameState: 'ready',
            lastRollSum: null,
            isRolling: false,
        };

        const Dice = ({ value }) => (
            <div className="pixel-art" style={{
                width: '64px',
                height: '64px',
                backgroundColor: '#fff',
                display: 'flex',
                justifyContent: 'center',
                alignItems: 'center',
                fontSize: '40px',
                color: '#000',
                border: '4px solid #000',
                margin: '0 8px',
            }}>
                {value}
            </div>
        );

        function DiceProphet() {
            const [state, dispatch] = useReducer(gameReducer, initialState);
            const { playRoll, playCorrect, playIncorrect, playBonus } = useSound();
            const [prediction, setPrediction] = useState(null);

            useEffect(() => {
                tg.ready();
                tg.expand();

                const fetchHighScore = async () => {
                    try {
                        const value = await new Promise((resolve, reject) => {
                            tg.CloudStorage.getItem("highScore", (error, value) => {
                                if (error) reject(error);
                                else resolve(value);
                            });
                        });
                        if (value) {
                            dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: parseInt(value) });
                        }
                    } catch (error) {
                        console.error("Failed to retrieve high score:", error);
                        tg.showAlert("Failed to retrieve high score. Your progress may not be saved.");
                    }
                };

                fetchHighScore();
            }, []);

            const rollDice = useCallback(() => {
                playRoll();
                return new Promise(resolve => {
                    setTimeout(() => {
                        const newDice1 = Math.floor(Math.random() * 6) + 1;
                        const newDice2 = Math.floor(Math.random() * 6) + 1;
                        dispatch({ type: 'ROLL_DICE', dice1: newDice1, dice2: newDice2 });
                        resolve({ dice1: newDice1, dice2: newDice2 });
                    }, 500);
                });
            }, [playRoll]);

            const handlePrediction = useCallback(async (pred) => {
                setPrediction(pred);
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                let isCorrect = false;
                let pointsEarned = 0;
                let newStreak = 0;

                if ((pred === 'less' && sum < 7) || (pred === 'equal' && sum === 7) || (pred === 'more' && sum > 7)) {
                    isCorrect = true;
                    newStreak = state.streak + 1;
                    if (pred === 'equal') {
                        pointsEarned = 50;
                        dispatch({ type: 'ACTIVATE_DOUBLE_POINTS' });
                        playBonus();
                    } else {
                        pointsEarned = 10 * (newStreak);
                    }
                    if (state.doublePointsRolls > 0) {
                        pointsEarned *= 2;
                    }
                    playCorrect();
                } else {
                    newStreak = 0;
                    pointsEarned = -5;
                    if (!state.secondChanceUsed) {
                        dispatch({ type: 'USE_SECOND_CHANCE' });
                        pointsEarned = 0;
                    }
                    playIncorrect();
                }

                const newScore = Math.max(0, state.score + pointsEarned);
                dispatch({ type: 'UPDATE_SCORE', newScore, newStreak });

                if (newScore > state.highScore) {
                    dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: newScore });
                    saveHighScore(newScore);
                }

                if (newScore === 0 && state.secondChanceUsed) {
                    dispatch({ type: 'GAME_OVER' });
                }

                setPrediction(null);
            }, [state, rollDice, playCorrect, playIncorrect, playBonus]);

            const saveHighScore = useCallback(async (score) => {
                try {
                    await new Promise((resolve, reject) => {
                        tg.CloudStorage.setItem("highScore", score.toString(), (error) => {
                            if (error) reject(error);
                            else resolve();
                        });
                    });
                } catch (error) {
                    console.error("Failed to save high score:", error);
                    tg.showAlert("Failed to save high score. Your progress may not be saved.");
                }
            }, []);

            const startGame = useCallback(() => {
                dispatch({ type: 'START_GAME' });
            }, []);

            return (
                <div style={{ textAlign: 'center', padding: '20px' }}>
                    <h1 style={{ fontSize: '24px', marginBottom: '20px' }}>DICE PROPHET</h1>
                    {state.gameState === 'ready' ? (
                        <button onClick={startGame} style={{
                            backgroundColor: '#00ff00',
                            color: '#000',
                            border: 'none',
                            padding: '10px 20px',
                            fontSize: '16px',
                            cursor: 'pointer'
                        }}>
                            START GAME
                        </button>
                    ) : state.gameState === 'playing' ? (
                        <>
                            <div style={{ fontSize: '20px', marginBottom: '20px' }}>
                                SCORE: {state.score}
                            </div>
                            <div style={{ fontSize: '16px', marginBottom: '20px' }}>
                                STREAK: {state.streak} | HIGH SCORE: {state.highScore}
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '20px' }}>
                                <Dice value={state.dice1} />
                                <Dice value={state.dice2} />
                            </div>
                            {state.lastRollSum && (
                                <div style={{ fontSize: '18px', marginBottom: '20px' }}>
                                    SUM: {state.lastRollSum}
                                </div>
                            )}
                            <div>
                                <button
                                    onClick={() => handlePrediction('less')}
                                    disabled={prediction !== null}
                                    style={{
                                        backgroundColor: prediction === 'less' ? '#ff0000' : '#00ff00',
                                        color: '#000',
                                        border: 'none',
                                        padding: '10px 20px',
                                        fontSize: '16px',
                                        margin: '0 10px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    LESS THAN 7
                                </button>
                                <button
                                    onClick={() => handlePrediction('equal')}
                                    disabled={prediction !== null}
                                    style={{
                                        backgroundColor: prediction === 'equal' ? '#ff0000' : '#00ff00',
                                        color: '#000',
                                        border: 'none',
                                        padding: '10px 20px',
                                        fontSize: '16px',
                                        margin: '0 10px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    EQUAL TO 7
                                </button>
                                <button
                                    onClick={() => handlePrediction('more')}
                                    disabled={prediction !== null}
                                    style={{
                                        backgroundColor: prediction === 'more' ? '#ff0000' : '#00ff00',
                                        color: '#000',
                                        border: 'none',
                                        padding: '10px 20px',
                                        fontSize: '16px',
                                        margin: '0 10px',
                                        cursor: 'pointer'
                                    }}
                                >
                                    MORE THAN 7
                                </button>
                            </div>
                            {state.doublePointsRolls > 0 && (
                                <div style={{ fontSize: '16px', marginTop: '20px' }} className="blink">
                                    DOUBLE POINTS: {state.doublePointsRolls} ROLLS LEFT
                                </div>
                            )}
                            {!state.secondChanceUsed && (
                                <div style={{ fontSize: '16px', marginTop: '20px' }}>
                                    SECOND CHANCE AVAILABLE
                                </div>
                            )}
                        </>
                    ) : (
                        <>
                            <div style={{ fontSize: '24px', marginBottom: '20px' }}>GAME OVER</div>
                            <div style={{ fontSize: '20px', marginBottom: '20px' }}>
                                FINAL SCORE: {state.score}
                            </div>
                            <div style={{ fontSize: '18px', marginBottom: '20px' }}>
                                HIGH SCORE: {state.highScore}
                            </div>
<button onClick={startGame} style={{
                                backgroundColor: '#00ff00',
                                color: '#000',
                                border: 'none',
                                padding: '10px 20px',
                                fontSize: '16px',
                                cursor: 'pointer'
                            }}>
                                PLAY AGAIN
                            </button>
                        </>
                    )}
                </div>
            );
        }

        // Error Boundary component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                console.error("Caught an error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ textAlign: 'center', color: '#ff0000', padding: '20px' }}>
                            <h2 style={{ fontSize: '24px', marginBottom: '20px' }}>SYSTEM ERROR</h2>
                            <p style={{ fontSize: '16px' }}>PLEASE RESTART</p>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        ReactDOM.render(
            <React.StrictMode>
                <ErrorBoundary>
                    <DiceProphet />
                </ErrorBoundary>
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
