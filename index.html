<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Prophet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'RetroPixel';
            src: url('https://fonts.cdnfonts.com/css/pixeloid-sans') format('truetype');
        }

        body {
            font-family: 'RetroPixel', sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice-roll {
            animation: roll 0.5s ease-out;
        }

        .dice-shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .bonus-appear {
            animation: pixelFadeIn 0.5s steps(5) forwards;
        }

        @keyframes pixelFadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            20% { opacity: 0.2; transform: scale(0.84); }
            40% { opacity: 0.4; transform: scale(0.88); }
            60% { opacity: 0.6; transform: scale(0.92); }
            80% { opacity: 0.8; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out infinite;
        }

        .fade-in {
            animation: pixelFadeIn 0.3s steps(3) forwards;
        }

        .scale-in {
            animation: pixelScaleIn 0.3s steps(3) forwards;
        }

        @keyframes pixelScaleIn {
            0% { transform: scale(0); }
            33% { transform: scale(0.33); }
            66% { transform: scale(0.66); }
            100% { transform: scale(1); }
        }

        .slide-in {
            animation: pixelSlideIn 0.3s steps(3) forwards;
        }

        @keyframes pixelSlideIn {
            0% { transform: translateY(-10px); opacity: 0; }
            33% { transform: translateY(-6.66px); opacity: 0.33; }
            66% { transform: translateY(-3.33px); opacity: 0.66; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .feedback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: pixelFadeOutOverlay 0.5s steps(5) forwards;
            z-index: 50;
        }

        .feedback.success {
            background-color: rgba(0, 255, 0, 0.2);
        }

        .feedback.failure {
            background-color: rgba(255, 0, 0, 0.2);
        }

        @keyframes pixelFadeOutOverlay {
            0% { opacity: 1; }
            20% { opacity: 0.8; }
            40% { opacity: 0.6; }
            60% { opacity: 0.4; }
            80% { opacity: 0.2; }
            100% { opacity: 0; }
        }

        .pixel-border {
            box-shadow: 
                -3px -3px 0 1px #000,
                3px -3px 0 1px #000,
                -3px 3px 0 1px #000,
                3px 3px 0 1px #000;
        }

        .pixel-button {
            background: linear-gradient(45deg, #4a4a4a, #2a2a2a);
            border: none;
            color: #fff;
            padding: 10px 20px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .pixel-button::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: linear-gradient(45deg, #5a5a5a, #3a3a3a);
            z-index: -1;
        }

        .pixel-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #000;
        }

        .pixel-button:active {
            transform: translateY(2px);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useReducer, useRef } = React;
        const tg = window.Telegram.WebApp;

        // Sound effects
        const useSound = () => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const playRetroSound = (frequency, type, duration) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            };

            return {
                playDiceRoll: useCallback(() => playRetroSound(150, 'sawtooth', 0.3), []),
                playCorrect: useCallback(() => playRetroSound(440, 'square', 0.2), []),
                playIncorrect: useCallback(() => playRetroSound(110, 'square', 0.2), []),
                playBonus: useCallback(() => playRetroSound(880, 'sine', 0.3), [])
            };
        };

        // Game timer hook (unchanged)

        // Game reducer (unchanged)

        // Memoized components
        const DiceDisplay = React.memo(({ value, rolling }) => (
            <div 
                className={`w-24 h-24 bg-gray-700 rounded-lg flex items-center justify-center text-5xl font-bold shadow-lg pixel-border ${rolling ? 'dice-roll dice-shake' : ''}`}
                aria-label={`Dice showing ${value}`}
                role="img"
            >
                {[...Array(value)].map((_, i) => (
                    <div key={i} className="w-3 h-3 bg-white rounded-full m-1"></div>
                ))}
            </div>
        ));

        const BonusDisplay = React.memo(({ bonus, safeZoneRolls }) => (
            <div className="mb-4 scale-in">
                <div className="px-4 py-2 bg-gradient-to-r from-purple-500 to-indigo-500 text-white rounded-lg flex items-center justify-center bonus-appear shadow-md pixel-border">
                    <i className={`fas ${bonus === 'Safe Zone' ? 'fa-shield-alt' : 'fa-clock'} mr-2`} aria-hidden="true"></i>
                    {bonus}
                    {bonus === 'Safe Zone' && ` (${safeZoneRolls} rolls left)`}
                </div>
            </div>
        ));

        const ScoreDisplay = React.memo(({ score, multiplier, scoreChange, highScore }) => (
            <div className="text-center">
                <div className="text-4xl mb-2 font-extrabold pixel-border p-2 bg-gray-800 rounded-lg">
                    Score: <span className="text-green-400">{Math.floor(score)}</span>
                    {scoreChange !== 0 && (
                        <span className={`ml-2 ${scoreChange > 0 ? 'text-green-400' : 'text-red-400'} slide-in`}>
                            {scoreChange > 0 ? '+' : ''}{Math.floor(scoreChange)}
                        </span>
                    )}
                </div>
                <div className="text-2xl mb-2 pixel-border p-2 bg-gray-800 rounded-lg">
                    Multiplier: <span className="text-blue-400 font-bold">×{multiplier}</span>
                </div>
                <div className="text-xl pixel-border p-2 bg-gray-800 rounded-lg">
                    High Score: <span className="text-purple-400 font-bold">{Math.floor(highScore)}</span>
                </div>
            </div>
        ));

        const Tutorial = ({ onComplete }) => {
            // Tutorial component (unchanged)
        };
        
        const initialState = {
            // Initial state (unchanged)
        };

        function DiceProphet() {
            // Component logic (unchanged)

            const renderGameContent = useMemo(() => {
                switch (state.gameState) {
                    case 'ready':
                        return (
                            <div className="text-center">
                                <button 
                                    onClick={startGame}
                                    className="px-6 py-3 bg-gradient-to-r from-green-400 to-blue-500 text-white rounded-lg hover:from-green-500 hover:to-blue-600 transition-colors duration-200 text-xl font-bold pulse pixel-button"
                                >
                                    Start Game
                                </button>
                            </div>
                        );
                    case 'playing':
                    case 'allIn':
                        return (
                            <div className="text-center">
                                <div className="text-4xl font-bold mb-4 pixel-border p-2 bg-gray-800 rounded-lg">
                                    <i className="far fa-clock mr-2" aria-hidden="true"></i>{timeLeft}s
                                    {isFrozen && <span className="ml-2 text-blue-400" role="img" aria-label="Frozen">❄️</span>}
                                </div>
                                <ScoreDisplay 
                                    score={state.score} 
                                    multiplier={state.multiplier} 
                                    scoreChange={state.scoreChange}
                                    highScore={state.highScore}
                                />
                                <div className="flex justify-center space-x-6 my-6">
                                    <DiceDisplay value={state.dice1} rolling={state.isRolling} />
                                    <DiceDisplay value={state.dice2} rolling={state.isRolling} />
                                </div>
                                {state.lastRollResult && (
                                    <div className={`text-3xl mb-4 font-bold ${state.lastRollResult < 7 ? 'text-red-400' : state.lastRollResult > 7 ? 'text-green-400' : 'text-yellow-400'} fade-in pixel-border p-2 bg-gray-800 rounded-lg`}>
                                        Last Roll: {state.lastRollResult}
                                    </div>
                                )}
                                <div className="flex justify-center space-x-2 mb-4">
                                    {state.recentRolls.map((roll, index) => (
                                        <div key={index} className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold ${roll < 7 ? 'bg-red-500' : roll > 7 ? 'bg-green-500' : 'bg-yellow-500'} text-white pixel-border`}>
                                            {roll}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mb-6">
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: Less than 7" : "Predict less than 7"}
                                        className={`w-full sm:w-auto px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''} pixel-button`}
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('less') : handlePrediction('less')}
                                        disabled={state.isRolling}
                                    >
                                        <i className="fas fa-arrow-down mr-2" aria-hidden="true"></i>
                                        {state.gameState === 'allIn' ? "All-In: Less than 7" : "Less than 7"}
                                    </button>
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: More than 7" : "Predict more than 7"}
className={`w-full sm:w-auto px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''} pixel-button`}
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('more') : handlePrediction('more')}
                                        disabled={state.isRolling}
                                    >
                                        <i className="fas fa-arrow-up mr-2" aria-hidden="true"></i>
                                        {state.gameState === 'allIn' ? "All-In: More than 7" : "More than 7"}
                                    </button>
                                </div>
                                {state.activeBonus && (
                                    <BonusDisplay bonus={state.activeBonus} safeZoneRolls={state.safeZoneRolls} />
                                )}
                                {state.gameState === 'allIn' && (
                                    <div className="text-2xl font-bold text-yellow-400 mb-4 pixel-border p-2 bg-gray-800 rounded-lg">
                                        All-In Round! Double or lose all your score!
                                    </div>
                                )}
                            </div>
                        );
                    case 'gameOver':
                        return (
                            <div className="text-center">
                                <div className="text-5xl font-bold mb-6 fade-in pixel-border p-4 bg-gray-800 rounded-lg">Game Over!</div>
                                <div className="text-4xl mb-4 fade-in pixel-border p-2 bg-gray-800 rounded-lg">Final Score: {Math.floor(state.score)}</div>
                                <div className="text-3xl mb-6 fade-in pixel-border p-2 bg-gray-800 rounded-lg">High Score: {Math.floor(state.highScore)}</div>
                                <button 
                                    onClick={startGame}
                                    className="px-6 py-3 bg-gradient-to-r from-green-400 to-blue-500 text-white rounded-lg hover:from-green-500 hover:to-blue-600 transition-colors duration-200 text-xl font-bold pulse pixel-button"
                                >
                                    Play Again
                                </button>
                            </div>
                        );
                    default:
                        return null;
                }
            }, [state, timeLeft, isFrozen, startGame, handleAllIn, handlePrediction]);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-gray-900 to-gray-800 text-white p-4">
                    <h1 className="text-5xl font-extrabold mb-6 text-yellow-400 pixel-border p-4 bg-gray-800 rounded-lg">🎲 Dice Prophet 🎲</h1>
                    {showTutorial && <Tutorial onComplete={startGame} />}
                    {renderGameContent}
                    {feedback === 'success' && <div className="feedback success"></div>}
                    {feedback === 'failure' && <div className="feedback failure"></div>}
                </div>
            );
        }

        // Error Boundary component (unchanged)

        ReactDOM.render(
            <React.StrictMode>
                <ErrorBoundary>
                    <DiceProphet />
                </ErrorBoundary>
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
