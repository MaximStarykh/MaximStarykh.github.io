<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice Prophet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Montserrat&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FFF8E8;
        }
        .bg-gradient-game {
            background: linear-gradient(to bottom, #FFF8E8, #FFFFFF);
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .frozen {
            animation: frozenGlow 1s ease-in-out infinite alternate;
        }
        @keyframes frozenGlow {
            from {
                box-shadow: 0 0 10px #80d0ff;
            }
            to {
                box-shadow: 0 0 20px #80d0ff;
            }
        }
        .shadow-custom {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .all-in-popup {
            animation: fadeInOut 2s ease-in-out;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Dice Styles */
        .dice-container {
            display: grid;
            place-items: center;
            perspective: 1000px;
        }

        .dice {
            position: relative;
            width: 25vw;
            height: 25vw;
            max-width: 120px;
            max-height: 120px;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        .dice.rolling {
            animation: rolling 1.25s ease-in-out;
        }

        @keyframes rolling {
            from {
                transform: rotateX(0deg) rotateY(0deg);
            }
            to {
                transform: rotateX(720deg) rotateY(720deg);
            }
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 2px solid #f6f3f0;
            transform-style: preserve-3d;
            background: linear-gradient(
                145deg, #dddbd8, #fff
            );
        }

        .face::before {
            position: absolute;
            content: '';
            width: 100%;
            height: 100%;
            border-radius: 10px;
            background: #f6f3f0;
            transform: translateZ(-1px);
        }

        .face::after {
            position: absolute;
            content: '';
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #131210;
        }

        .front {
            transform: translateZ(40px);
        }

        .back {
            transform: rotateX(180deg) translateZ(40px);
        }

        .top {
            transform: rotateX(90deg) translateZ(40px);
        }

        .bottom {
            transform: rotateX(-90deg) translateZ(40px);
        }

        .right {
            transform: rotateY(90deg) translateZ(40px);
        }

        .left {
            transform: rotateY(-90deg) translateZ(40px);
        }

        .front::after {
            width: 20px;
            height: 20px;
            background: #f63330;
            margin: -10px 0 0 -10px;
        }

        .back::after {
            margin: -23px 0 0 -20px;
            box-shadow: 28px 0,
                        0 18px,
                        28px 18px,
                        0 36px,
                        28px 36px;
        }

        .top::after {
            margin: -20px 0 0 -20px;
            box-shadow: 28px 28px;
        }

        .bottom::after {
            margin: -24px 0 0 -24px;
            box-shadow: 18px 18px,
                        36px 36px,
                        36px 0,
                        0 36px;
        }

        .right::after {
            margin: -20px 0 0 -20px;
            box-shadow: 28px 0,
            0 28px,
            28px 28px;
        }

        .left::after {
            margin: -23px 0 0 -23px;
            box-shadow: 18px 18px,
                        36px 36px;
        }

    </style>
</head>
<body class="bg-gradient-game text-black min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useReducer, useRef } = React;
        const tg = window.Telegram.WebApp;

        // Constants and Configurations
        const BASE_POINTS = 100;
        const BONUS_ACTIVATION_ROLLS = 5;
        const BONUS_ACTIVATION_CHANCE = 0.5;
        const BONUS_TYPE_CHANCE = 0.5;
        const SAFE_ZONE_ROLLS = 3;
        const TIME_FREEZE_DURATION = 5;
        const MAX_MULTIPLIER = 12;
        const INITIAL_TIME = 60;

        // Sound effects
        const useSound = () => {
            const audioContextRef = useRef(null);

            useEffect(() => {
                audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
            }, []);

            const playSound = useCallback((frequency, duration) => {
                const audioContext = audioContextRef.current;
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration - 0.01);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            }, []);

            return {
                playDiceRoll: () => playSound(300, 0.3),
                playCorrect: () => playSound(440, 0.2),
                playIncorrect: () => playSound(220, 0.2),
                playBonus: () => playSound(660, 0.3)
            };
        };

        // Game timer hook
        const useGameTimer = (initialTime) => {
            const [timeLeft, setTimeLeft] = useState(initialTime);
            const [isFrozen, setIsFrozen] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                if (isFrozen) {
                    clearInterval(timerRef.current);
                } else {
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => Math.max(prev - 1, 0));
                    }, 1000);
                }
                return () => clearInterval(timerRef.current);
            }, [isFrozen]);

            const freezeTimer = useCallback(() => {
                setIsFrozen(true);
                setTimeout(() => {
                    setIsFrozen(false);
                }, TIME_FREEZE_DURATION * 1000);
            }, []);

            const resetTimer = useCallback(() => {
                setTimeLeft(initialTime);
                setIsFrozen(false);
            }, [initialTime]);

            return { timeLeft, freezeTimer, isFrozen, resetTimer };
        };

        // Game reducer
        const initialState = {
            dice1: 1,
            dice2: 1,
            score: 0,
            highScore: 0,
            multiplier: 1,
            activeBonus: null,
            gameState: 'ready',
            safeZoneRolls: 0,
            rollCount: 0,
            isRolling: false,
            streak: 0,
            isTimeFreezeActive: false,
            buttonsDisabled: false,
            showAllInPopup: false,
            showGameOverScreen: false,
        };

        const gameReducer = (state, action) => {
            switch (action.type) {
                case 'START_GAME':
                    return { ...initialState, gameState: 'playing', highScore: state.highScore };
                case 'END_GAME':
                    return { ...state, gameState: 'allIn', buttonsDisabled: false };
                case 'GAME_OVER':
                    return { ...state, gameState: 'gameOver' };
                case 'ROLL_DICE':
                    return {
                        ...state,
                        dice1: action.dice1,
                        dice2: action.dice2,
                        rollCount: state.rollCount + 1,
                        isRolling: false,
                    };
                case 'UPDATE_SCORE':
                    return {
                        ...state,
                        score: action.newScore,
                        multiplier: action.multiplier,
                        streak: action.isCorrect ? state.streak + 1 : 0,
                    };
                case 'ACTIVATE_BONUS':
                    return {
                        ...state,
                        activeBonus: action.bonus,
                        safeZoneRolls: action.bonus === 'Safe Zone' ? SAFE_ZONE_ROLLS : state.safeZoneRolls,
                        isTimeFreezeActive: action.bonus === 'Time Freeze' ? true : state.isTimeFreezeActive,
                    };
                case 'DEACTIVATE_BONUS':
                    return { ...state, activeBonus: null, safeZoneRolls: 0, isTimeFreezeActive: false };
                case 'UPDATE_HIGH_SCORE':
                    return { ...state, highScore: action.highScore };
                case 'SET_ROLLING':
                    return { ...state, isRolling: action.isRolling };
                case 'DECREASE_SAFE_ZONE':
                    return { ...state, safeZoneRolls: state.safeZoneRolls - 1 };
                case 'DISABLE_BUTTONS':
                    return { ...state, buttonsDisabled: true };
                case 'ENABLE_BUTTONS':
                    return { ...state, buttonsDisabled: false };
                case 'SHOW_ALLIN_POPUP':
                    return { ...state, showAllInPopup: true };
                case 'HIDE_ALLIN_POPUP':
                    return { ...state, showAllInPopup: false };
                case 'SHOW_GAME_OVER_SCREEN':
                    return { ...state, showGameOverScreen: true };
                default:
                    return state;
            }
        };

        // Tutorial Component with Centered Text and Button Adjustments
        const Tutorial = ({ onComplete }) => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const slides = [
                <div className="flex flex-col items-center justify-center h-full text-center px-4">
                    <h2 className="text-4xl font-bold mb-6 text-[#D52941]">Welcome to Dice Prophet!</h2>
                    <p className="mb-6 text-xl">Predict the future, master the dice, and become a legend!</p>
                    <div className="space-y-4">
                        <p><i className="fas fa-dice text-[#FCD581] mr-2"></i> Guess if the sum will be less or more than 7</p>
                        <p><i className="fas fa-chart-line text-[#990D35] mr-2"></i> Build your streak for bigger scores</p>
                        <p><i className="fas fa-exclamation-triangle text-[#D52941] mr-2"></i> But beware of the dreaded 7!</p>
                    </div>
                </div>,
                <div className="flex flex-col items-center justify-center h-full text-center px-4">
                    <h2 className="text-4xl font-bold mb-6 text-[#D52941]">Power-Ups and Bonuses</h2>
                    <div className="space-y-4">
                        <p><i className="fas fa-shield-alt text-[#990D35] mr-2"></i> Safe Zone: Protects you from losing your streak</p>
                        <p><i className="fas fa-clock text-[#FCD581] mr-2"></i> Time Freeze: Stops the clock for extra gaming time</p>
                        <p><i className="fas fa-gift text-[#D52941] mr-2"></i> Look out for surprise bonuses to boost your score!</p>
                    </div>
                </div>,
                <div className="flex flex-col items-center justify-center h-full text-center px-4">
                    <h2 className="text-4xl font-bold mb-6 text-[#D52941]">All or Nothing!</h2>
                    <p className="mb-6 text-xl">When time runs out, you have one last chance to double your score!</p>
                    <div className="space-y-4">
                        <p><i className="fas fa-trophy text-[#FCD581] mr-2"></i> Go all-in for a shot at glory</p>
                        <p><i className="fas fa-skull-crossbones text-[#990D35] mr-2"></i> But be careful, you could lose it all!</p>
                        <p><i className="fas fa-star text-[#D52941] mr-2"></i> Do you have what it takes to be a Dice Prophet?</p>
                    </div>
                </div>
            ];

            const handleTouchStart = (e) => {
                touchStartX.current = e.changedTouches[0].screenX;
            };

            const handleTouchEnd = (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                if (touchStartX.current - touchEndX > 50) {
                    // Swipe left
                    if (currentSlide < slides.length - 1) {
                        setCurrentSlide(prev => prev + 1);
                    }
                } else if (touchEndX - touchStartX.current > 50) {
                    // Swipe right
                    if (currentSlide > 0) {
                        setCurrentSlide(prev => prev - 1);
                    }
                }
            };

            const touchStartX = useRef(0);

            // Button Colors
            const buttonColor = 'bg-[#D52941]';
            const buttonHoverColor = 'hover:bg-[#990D35]';

            return (
                <div
                    className="fixed inset-0 bg-gradient-game flex flex-col items-center justify-between z-50"
                    onTouchStart={handleTouchStart}
                    onTouchEnd={handleTouchEnd}
                >
                    <div className="flex-grow flex items-center justify-center w-full">
                        {slides[currentSlide]}
                    </div>
                    <div className="w-full px-4 mb-8 flex justify-center">
                        {currentSlide === slides.length - 1 ? (
                            <button
                                onClick={onComplete}
                                className={`w-full max-w-md py-4 ${buttonColor} text-white rounded-full ${buttonHoverColor} transition-colors duration-200 font-bold text-2xl`}
                            >
                                Start Game
                            </button>
                        ) : (
                            <button
                                onClick={() => setCurrentSlide(prev => prev + 1)}
                                className={`w-full max-w-md py-4 ${buttonColor} text-white rounded-full ${buttonHoverColor} transition-colors duration-200 font-bold text-2xl`}
                            >
                                Next
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        // Dice Component
        const Dice = ({ number, rolling }) => {
            const diceRef = useRef(null);

            useEffect(() => {
                if (rolling) {
                    diceRef.current.classList.add('rolling');
                    setTimeout(() => {
                        diceRef.current.classList.remove('rolling');
                        setDiceFace(number);
                    }, 1250);
                } else {
                    setDiceFace(number);
                }
            }, [rolling, number]);

            const setDiceFace = (num) => {
                let transform = '';
                switch (num) {
                    case 1:
                        transform = 'rotateX(0deg) rotateY(0deg)';
                        break;
                    case 2:
                        transform = 'rotateX(-90deg) rotateY(0deg)';
                        break;
                    case 3:
                        transform = 'rotateY(90deg)';
                        break;
                    case 4:
                        transform = 'rotateY(-90deg)';
                        break;
                    case 5:
                        transform = 'rotateX(90deg)';
                        break;
                    case 6:
                        transform = 'rotateX(180deg)';
                        break;
                    default:
                        transform = 'rotateX(0deg) rotateY(0deg)';
                        break;
                }
                diceRef.current.style.transform = transform;
            };

            return (
                <div className="dice-container">
                    <div className="dice" ref={diceRef}>
                        <div className="face front"></div>
                        <div className="face back"></div>
                        <div className="face top"></div>
                        <div className="face bottom"></div>
                        <div className="face right"></div>
                        <div className="face left"></div>
                    </div>
                </div>
            );
        };

        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                console.error("Caught an error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="text-center text-[#D52941] p-4">
                            <h2 className="text-3xl font-bold mb-4">Oops! Something went wrong.</h2>
                            <p className="text-xl">Please try refreshing the page or contact support if the problem persists.</p>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        function DiceProphet() {
            const [state, dispatch] = useReducer(gameReducer, initialState);
            const { timeLeft, freezeTimer, isFrozen, resetTimer } = useGameTimer(INITIAL_TIME);
            const { playDiceRoll, playCorrect, playIncorrect, playBonus } = useSound();
            const [showTutorial, setShowTutorial] = useState(true);

            useEffect(() => {
                tg.ready();
                tg.expand();

                const fetchHighScore = async () => {
                    try {
                        const value = await new Promise((resolve, reject) => {
                            tg.CloudStorage.getItem("highScore", (error, value) => {
                                if (error) reject(error);
                                else resolve(value);
                            });
                        });
                        if (value) {
                            dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: parseInt(value) });
                        }
                    } catch (error) {
                        console.error("Failed to retrieve high score:", error);
                        dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: 0 });
                    }
                };

                fetchHighScore();
            }, []);

            useEffect(() => {
                if (timeLeft === 0 && state.gameState === 'playing') {
                    dispatch({ type: 'DISABLE_BUTTONS' });
                    dispatch({ type: 'SHOW_ALLIN_POPUP' });
                    setTimeout(() => {
                        dispatch({ type: 'HIDE_ALLIN_POPUP' });
                        dispatch({ type: 'END_GAME' });
                    }, 2000); // Show popup for 2 seconds
                }
            }, [timeLeft, state.gameState]);

            useEffect(() => {
                if (state.isTimeFreezeActive) {
                    freezeTimer();
                    setTimeout(() => {
                        dispatch({ type: 'DEACTIVATE_BONUS' });
                    }, TIME_FREEZE_DURATION * 1000);
                }
            }, [state.isTimeFreezeActive, freezeTimer]);

            useEffect(() => {
                if (state.gameState === 'gameOver') {
                    if (state.score > state.highScore) {
                        dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: state.score });
                        saveHighScore(state.score);
                    }
                }
            }, [state.gameState, state.score, state.highScore]);

            useEffect(() => {
                if (state.gameState === 'gameOver' && !state.showGameOverScreen) {
                    const timeout = setTimeout(() => {
                        dispatch({ type: 'SHOW_GAME_OVER_SCREEN' });
                    }, 2000);

                    return () => clearTimeout(timeout);
                }
            }, [state.gameState, state.showGameOverScreen]);

            const saveHighScore = useCallback(async (score) => {
                try {
                    await new Promise((resolve, reject) => {
                        tg.CloudStorage.setItem("highScore", score.toString(), (error) => {
                            if (error) reject(error);
                            else resolve();
                        });
                    });
                } catch (error) {
                    console.error("Failed to save high score:", error);
                }
            }, []);

            const startGame = useCallback(() => {
                setShowTutorial(false);
                resetTimer();
                dispatch({ type: 'START_GAME' });
            }, [resetTimer]);

            const rollDice = useCallback(() => {
                dispatch({ type: 'SET_ROLLING', isRolling: true });
                playDiceRoll();
                tg.HapticFeedback.impactOccurred('medium');
                return new Promise(resolve => {
                    setTimeout(() => {
                        const newDice1 = Math.floor(Math.random() * 6) + 1;
                        const newDice2 = Math.floor(Math.random() * 6) + 1;
                        dispatch({ type: 'ROLL_DICE', dice1: newDice1, dice2: newDice2 });
                        resolve({ dice1: newDice1, dice2: newDice2 });
                    }, 1250); // Match the dice animation duration
                });
            }, [playDiceRoll]);

            const processPrediction = useCallback(async (pred, isAllIn = false) => {
                if (state.buttonsDisabled || state.isRolling) return;
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                const isCorrect = (pred === 'less' && sum < 7) || (pred === 'more' && sum > 7);
                let newScore = state.score;
                let newMultiplier = state.streak + 1;

                if (isCorrect) {
                    if (isAllIn) {
                        newScore *= 2;
                    } else {
                        newScore += BASE_POINTS * newMultiplier;
                    }
                    playCorrect();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    if (isAllIn) {
                        newScore = 0;
                    } else {
                        if (sum === 7) {
                            newScore = 0;
                            newMultiplier = 1;
                        } else {
                            newMultiplier = 1;
                        }
                    }
                    playIncorrect();
                    tg.HapticFeedback.notificationOccurred('error');
                }

                if (state.activeBonus === 'Safe Zone' && !isAllIn) {
                    dispatch({ type: 'DECREASE_SAFE_ZONE' });
                    if (state.safeZoneRolls <= 1) {
                        dispatch({ type: 'DEACTIVATE_BONUS' });
                    }
                } else if (!isCorrect && !isAllIn) {
                    dispatch({ type: 'DEACTIVATE_BONUS' });
                }

                dispatch({
                    type: 'UPDATE_SCORE',
                    newScore: newScore,
                    multiplier: newMultiplier,
                    isCorrect: isCorrect,
                });

                if (!isAllIn && (state.rollCount + 1) % BONUS_ACTIVATION_ROLLS === 0 && !state.activeBonus) {
                    const bonusChance = Math.random();
                    if (bonusChance < BONUS_ACTIVATION_CHANCE) {
                        const bonusTypeChance = Math.random();
                        if (bonusTypeChance < BONUS_TYPE_CHANCE) {
                            dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Safe Zone' });
                            playBonus();
                        } else {
                            dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Time Freeze' });
                            playBonus();
                        }
                    }
                }

                if (isAllIn) {
                    // Wait for 2 seconds to show the dice result before game over
                    setTimeout(() => {
                        dispatch({ type: 'GAME_OVER' });
                    }, 2000);
                }
            }, [state, rollDice, playCorrect, playIncorrect, playBonus]);

            const renderGameContent = () => {
                if (state.gameState === 'gameOver' && !state.showGameOverScreen) {
                    // Show the last game state during the 2-second pause
                    return (
                        <div className="flex flex-col items-center justify-between h-screen bg-gradient-game text-black p-4">
                            {/* Display the last game state without interactions */}
                            {renderGame()}
                        </div>
                    );
                }

                switch (state.gameState) {
                    case 'ready':
                        return (
                            <div className="text-center">
                                <button
                                    onClick={startGame}
                                    className="w-4/5 max-w-md px-8 py-4 bg-[#FCD581] text-[#990D35] rounded-full transition-colors duration-200 text-2xl font-bold shadow-lg"
                                >
                                    Start Game
                                </button>
                            </div>
                        );
                    case 'playing':
                    case 'allIn':
                        return renderGame();
                    case 'gameOver':
                        return (
                            <div className="text-center space-y-6">
                                <div className="text-5xl font-bold mb-6 text-[#D52941] fade-in">Game Over!</div>
                                <div className="text-4xl mb-4 fade-in">Final Score: {Math.floor(state.score)}</div>
                                <div className="text-3xl mb-6 fade-in">High Score: {Math.floor(state.highScore)}</div>
                                <button
                                    onClick={startGame}
                                    className="w-4/5 max-w-md px-8 py-4 bg-[#D52941] text-white rounded-full text-2xl font-bold shadow-lg"
                                >
                                    Play Again
                                </button>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            const renderGame = () => (
                <div className="flex flex-col items-center justify-between h-screen bg-gradient-game text-black p-4">
                    <div className="w-full max-w-md">
                        <div className="bg-white bg-opacity-20 rounded-2xl p-4 mb-4 relative overflow-hidden shadow-custom">
                            <div className="flex flex-col items-center mb-2">
                                <p className="text-sm opacity-70">Score</p>
                                <p className="text-5xl font-bold">
                                    {Math.floor(state.score)} {state.activeBonus === 'Safe Zone' && '🛡️'}
                                </p>
                            </div>
                            <div
                                className={`flex items-center justify-center bg-white bg-opacity-30 rounded-xl py-2 ${
                                    state.isTimeFreezeActive ? 'frozen' : ''
                                } shadow-custom`}
                            >
                                <i className="far fa-clock mr-2"></i>
                                <p className="text-2xl font-semibold">{timeLeft}s {state.isTimeFreezeActive && '❄️'}</p>
                            </div>
                        </div>
                        <div className="flex justify-center items-center space-x-2 mb-4">
                            <div className="bg-white bg-opacity-20 rounded-xl py-1 px-3 flex items-center shadow-custom">
                                <i className="fas fa-bolt mr-1"></i>
                                <span className="font-semibold">
                                    Streak: {state.streak} {state.activeBonus === 'Safe Zone' && '🛡️'}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-center items-center space-x-8 my-8">
                        <Dice number={state.dice1} rolling={state.isRolling} />
                        <Dice number={state.dice2} rolling={state.isRolling} />
                    </div>

                    <div className="w-full flex flex-col items-center space-y-4 mb-8">
                        <button
                            className={`w-full max-w-md py-4 ${
                                state.gameState === 'allIn' ? 'bg-[#FCD581]' : 'bg-green-500'
                            } text-white font-bold rounded-xl flex items-center justify-center transition-colors duration-150 shadow-custom`}
                            onClick={() => processPrediction('less', state.gameState === 'allIn')}
                            disabled={state.isRolling || state.buttonsDisabled}
                        >
                            <i className="fas fa-arrow-down mr-2"></i> {state.gameState === 'allIn' ? 'All-In: Less than 7' : 'Less than 7'}
                        </button>
                        <button
                            className={`w-full max-w-md py-4 ${
                                state.gameState === 'allIn' ? 'bg-[#FCD581]' : 'bg-red-500'
                            } text-white font-bold rounded-xl flex items-center justify-center transition-colors duration-150 shadow-custom`}
                            onClick={() => processPrediction('more', state.gameState === 'allIn')}
                            disabled={state.isRolling || state.buttonsDisabled}
                        >
                            <i className="fas fa-arrow-up mr-2"></i> {state.gameState === 'allIn' ? 'All-In: More than 7' : 'More than 7'}
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    {showTutorial && <Tutorial onComplete={startGame} />}
                    {renderGameContent()}
                    {state.showAllInPopup && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={() => dispatch({ type: 'HIDE_ALLIN_POPUP' })}>
                            <div className="bg-white rounded-2xl p-6 text-center all-in-popup shadow-custom">
                                <h2 className="text-3xl font-bold text-[#D52941]">All-In Round!</h2>
                                <p className="mt-4 text-xl">Double or Nothing!</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(
            <React.StrictMode>
                <ErrorBoundary>
                    <DiceProphet />
                </ErrorBoundary>
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
