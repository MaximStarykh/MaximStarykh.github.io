<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Prophet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Tailwind CSS with custom configuration for retro fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* Custom Tailwind CSS configuration for retro font */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Override Tailwind's font family */
        .retro-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* Retro Color Scheme */
        body {
            background-color: #1a1a2e; /* Dark navy blue */
            color: #eaeaea; /* Light gray */
        }

        /* Retro button styles */
        .retro-button {
            background-color: #0f3460; /* Dark blue */
            color: #eaeaea;
            border: 2px solid #e94560; /* Bright red */
            padding: 10px 20px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.2s ease-in-out;
        }

        .retro-button:hover {
            background-color: #e94560; /* Bright red */
            color: #0f3460;
            border-color: #0f3460;
        }

        .retro-button:active {
            transform: translateY(2px);
        }

        /* Dice styles */
        .dice {
            width: 80px;
            height: 80px;
            background-color: #16213e; /* Darker navy */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #eaeaea;
            border: 4px solid #e94560; /* Bright red */
            box-shadow: 0 0 10px #e94560;
        }

        /* Rolling animation */
        .dice-roll {
            animation: roll 0.5s ease-out;
        }

        @keyframes roll {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

        /* Feedback overlays */
        .feedback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: fadeOutOverlay 0.5s forwards;
            z-index: 50;
        }

        .feedback.success {
            background-color: rgba(0, 255, 0, 0.3);
        }

        .feedback.failure {
            background-color: rgba(255, 0, 0, 0.3);
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; }
        }

        /* Bonus Indicator */
        .bonus-indicator {
            background-color: #0f3460;
            color: #eaeaea;
            border: 2px solid #e94560;
            padding: 5px 10px;
            display: inline-flex;
            align-items: center;
            margin-bottom: 10px;
            animation: bonusAppear 0.5s ease-out;
        }

        @keyframes bonusAppear {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Retro font for headings */
        h1, h2, h3, h4, h5, h6, button, .dice, .score-display, .bonus-indicator, .retro-text {
            font-family: 'Press Start 2P', cursive;
        }

        /* Retro progress bar for timer */
        .timer-bar {
            width: 100%;
            height: 20px;
            background-color: #0f3460;
            border: 2px solid #e94560;
            position: relative;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background-color: #e94560;
            width: 100%;
            animation: timerCountdown linear forwards;
        }

        @keyframes timerCountdown {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* Retro input focus outline */
        button:focus {
            outline: none;
            box-shadow: 0 0 0 2px #eaeaea;
        }

        /* Adjustments for mobile view */
        @media (max-width: 640px) {
            .dice {
                width: 60px;
                height: 60px;
                font-size: 36px;
            }

            .retro-button {
                font-size: 12px;
                padding: 8px 16px;
            }

            .score-display {
                font-size: 18px;
            }
        }

        /* Additional styles */
        .score-display {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .multiplier-display {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .high-score-display {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Dice container */
        .dice-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Retro messages */
        .retro-message {
            font-size: 20px;
            margin-bottom: 20px;
            color: #eaeaea;
        }

        /* Retro roll history */
        .roll-history {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }

        .roll-history-item {
            width: 20px;
            height: 20px;
            background-color: #16213e;
            color: #eaeaea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid #e94560;
        }

        /* Retro tutorial styles */
        .tutorial-overlay {
            background-color: rgba(26, 26, 46, 0.95);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eaeaea;
        }

        .tutorial-content {
            background-color: #0f3460;
            border: 2px solid #e94560;
            padding: 20px;
            max-width: 300px;
            text-align: center;
        }

        .tutorial-button {
            margin-top: 20px;
        }

        /* Retro scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #e94560;
        }

        ::-webkit-scrollbar-track {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useReducer, useRef } = React;
        const tg = window.Telegram.WebApp;

        // Sound effects
        const useSound = () => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const playSound = (frequency, duration) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'square'; // Retro sound
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration - 0.01);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            };

            return {
                playDiceRoll: useCallback(() => playSound(300, 0.3), []),
                playCorrect: useCallback(() => playSound(440, 0.2), []),
                playIncorrect: useCallback(() => playSound(220, 0.2), []),
                playBonus: useCallback(() => playSound(660, 0.3), [])
            };
        };

        // Game timer hook
        const useGameTimer = (initialTime) => {
            const [timeLeft, setTimeLeft] = useState(initialTime);
            const [isFrozen, setIsFrozen] = useState(false);
            const isFrozenRef = useRef(isFrozen);
            const timerRef = useRef(null);

            useEffect(() => {
                isFrozenRef.current = isFrozen;
            }, [isFrozen]);

            const startTimer = useCallback(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => {
                    if (!isFrozenRef.current) {
                        setTimeLeft((prevTime) => Math.max(prevTime - 1, 0));
                    }
                }, 1000);
            }, []);

            const stopTimer = useCallback(() => {
                clearInterval(timerRef.current);
            }, []);

            const addTime = useCallback((seconds) => {
                setTimeLeft(prevTime => prevTime + seconds);
            }, []);

            const freezeTimer = useCallback(() => {
                setIsFrozen(true);
                setTimeout(() => setIsFrozen(false), 5000);
            }, []);

            useEffect(() => {
                return () => clearInterval(timerRef.current);
            }, []);

            return { timeLeft, startTimer, stopTimer, addTime, freezeTimer, isFrozen };
        };

        // Game reducer
        const gameReducer = (state, action) => {
            switch (action.type) {
                case 'START_GAME':
                    return { ...initialState, gameState: 'playing', highScore: state.highScore };
                case 'END_GAME':
                    return { ...state, gameState: 'allIn' };
                case 'GAME_OVER':
                    return { ...state, gameState: 'gameOver' };
                case 'ROLL_DICE':
                    return {
                        ...state,
                        dice1: action.dice1,
                        dice2: action.dice2,
                        lastRollResult: action.dice1 + action.dice2,
                        recentRolls: [action.dice1 + action.dice2, ...state.recentRolls.slice(0, 4)],
                        rollCount: state.rollCount + 1,
                        isRolling: false,
                    };
                case 'UPDATE_SCORE':
                    return {
                        ...state,
                        score: action.newScore,
                        scoreChange: action.change,
                        multiplier: action.multiplier,
                    };
                case 'ACTIVATE_BONUS':
                    return {
                        ...state,
                        activeBonus: action.bonus,
                        safeZoneRolls: action.bonus === 'Safe Zone' ? 3 : state.safeZoneRolls,
                    };
                case 'DEACTIVATE_BONUS':
                    return { ...state, activeBonus: null, safeZoneRolls: 0 };
                case 'UPDATE_HIGH_SCORE':
                    return { ...state, highScore: action.highScore };
                case 'SET_ROLLING':
                    return { ...state, isRolling: action.isRolling };
                case 'DECREASE_SAFE_ZONE':
                    return { ...state, safeZoneRolls: state.safeZoneRolls - 1 };
                default:
                    return state;
            }
        };

        // Memoized components
        const DiceDisplay = React.memo(({ value, rolling }) => (
            <div 
                className={`dice ${rolling ? 'dice-roll' : ''}`}
                aria-label={`Dice showing ${value}`}
                role="img"
            >
                {value}
            </div>
        ));

        const BonusDisplay = React.memo(({ bonus, safeZoneRolls }) => (
            <div className="bonus-indicator">
                <span className="mr-2">
                    {bonus === 'Safe Zone' ? '🛡️' : '⏳'}
                </span>
                {bonus}
                {bonus === 'Safe Zone' && ` (${safeZoneRolls} rolls)`}
            </div>
        ));

        const ScoreDisplay = React.memo(({ score, multiplier, scoreChange, highScore }) => (
            <div className="retro-text">
                <div className="score-display">
                    SCORE: {Math.floor(score)}
                    {scoreChange !== 0 && (
                        <span className={`ml-2 ${scoreChange > 0 ? 'text-green-500' : 'text-red-500'}`}>
                            {scoreChange > 0 ? '+' : ''}{Math.floor(scoreChange)}
                        </span>
                    )}
                </div>
                <div className="multiplier-display">
                    MULTIPLIER: ×{multiplier}
                </div>
                <div className="high-score-display">
                    HIGH SCORE: {Math.floor(highScore)}
                </div>
            </div>
        ));

        const Tutorial = ({ onComplete }) => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const touchStartX = useRef(0);
            const slides = [
                <div className="retro-text">
                    <h2>WELCOME TO DICE PROPHET!</h2>
                    <p>Predict the future, master the dice, and become a legend!</p>
                    <div>
                        <p>🎲 Guess if the sum will be less or more than 7</p>
                        <p>📈 Build your multiplier for bigger scores</p>
                        <p>⚠️ But beware of the dreaded 7!</p>
                    </div>
                </div>,
                <div className="retro-text">
                    <h2>POWER-UPS AND BONUSES</h2>
                    <div>
                        <p>🛡️ Safe Zone: Protects you from losing your score</p>
                        <p>⏳ Time Freeze: Stops the clock for extra gaming time</p>
                        <p>🎁 Look out for surprise bonuses to boost your score!</p>
                    </div>
                </div>,
                <div className="retro-text">
                    <h2>ALL OR NOTHING!</h2>
                    <p>When time runs out, you have one last chance to double your score!</p>
                    <div>
                        <p>🏆 Go all-in for a shot at glory</p>
                        <p>💀 But be careful, you could lose it all!</p>
                        <p>⭐ Do you have what it takes to be a Dice Prophet?</p>
                    </div>
                </div>
            ];

            const handleSwipe = useCallback((direction) => {
                if (direction === 'left' && currentSlide < slides.length - 1) {
                    setCurrentSlide(prev => prev + 1);
                } else if (direction === 'right' && currentSlide > 0) {
                    setCurrentSlide(prev => prev - 1);
                }
            }, [currentSlide, slides.length]);

            return (
                <div className="tutorial-overlay">
                    <div 
                        className="tutorial-content"
                        onTouchStart={(e) => touchStartX.current = e.touches[0].clientX}
                        onTouchEnd={(e) => {
                            const touchEndX = e.changedTouches[0].clientX;
                            const diff = touchStartX.current - touchEndX;
                            if (Math.abs(diff) > 50) {
                                handleSwipe(diff > 0 ? 'left' : 'right');
                            }
                        }}
                    >
                        {slides[currentSlide]}
                        <div className="tutorial-button">
                            {currentSlide === slides.length - 1 ? (
                                <button 
                                    onClick={onComplete}
                                    className="retro-button"
                                >
                                    START GAME
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setCurrentSlide(prev => prev + 1)}
                                    className="retro-button"
                                >
                                    NEXT
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        
        const initialState = {
            dice1: 1,
            dice2: 1,
            score: 0,
            highScore: 0,
            multiplier: 1,
            activeBonus: null,
            gameState: 'ready',
            safeZoneRolls: 0,
            rollCount: 0,
            lastRollResult: null,
            recentRolls: [],
            scoreChange: 0,
            isRolling: false,
        };

        function DiceProphet() {
            const [state, dispatch] = useReducer(gameReducer, initialState);
            const { timeLeft, startTimer, stopTimer, addTime, freezeTimer, isFrozen } = useGameTimer(60);
            const { playDiceRoll, playCorrect, playIncorrect, playBonus } = useSound();
            const [showTutorial, setShowTutorial] = useState(true);
            const [feedback, setFeedback] = useState(null);

            useEffect(() => {
                tg.ready();
                tg.expand();
                document.body.className = tg.colorScheme;
                
                const fetchHighScore = async () => {
                    try {
                        const value = await new Promise((resolve, reject) => {
                            tg.CloudStorage.getItem("highScore", (error, value) => {
                                if (error) reject(error);
                                else resolve(value);
                            });
                        });
                        if (value) {
                            dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: parseInt(value) });
                        }
                    } catch (error) {
                        console.error("Failed to retrieve high score:", error);
                        tg.showAlert("Failed to retrieve high score. Your progress may not be saved.");
                    }
                };

                fetchHighScore();

                return () => {
                    stopTimer();
                };
            }, [stopTimer]);

            useEffect(() => {
                if (timeLeft === 0 && state.gameState === 'playing') {
                    dispatch({ type: 'END_GAME' });
                }
            }, [timeLeft, state.gameState]);

            const rollDice = useCallback(() => {
                dispatch({ type: 'SET_ROLLING', isRolling: true });
                playDiceRoll();
                tg.HapticFeedback.impactOccurred('medium');
                return new Promise(resolve => {
                    setTimeout(() => {
                        const newDice1 = Math.floor(Math.random() * 6) + 1;
                        const newDice2 = Math.floor(Math.random() * 6) + 1;
                        dispatch({ type: 'ROLL_DICE', dice1: newDice1, dice2: newDice2 });
                        resolve({ dice1: newDice1, dice2: newDice2 });
                    }, 500);
                });
            }, [playDiceRoll]);

            const handlePrediction = useCallback(async (pred) => {
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                const isCorrect = (pred === 'less' && sum < 7) || (pred === 'more' && sum > 7);
                let newScore = state.score;
                let newMultiplier = state.multiplier;
                
                if (isCorrect) {
                    const basePoints = 150 * newMultiplier;
                    newScore += basePoints;
                    newMultiplier = Math.min(newMultiplier + 1, 15);
                    playCorrect();
                    tg.HapticFeedback.notificationOccurred('success');
                    setFeedback('success');
                } else {
                    if (state.activeBonus === 'Safe Zone') {
                        // Safe Zone active: No penalties applied
                        playIncorrect();
                        tg.HapticFeedback.notificationOccurred('warning');
                        setFeedback('failure');
                    } else {
                        if (sum === 7) {
                            newScore = 0; // Reset score
                            playIncorrect();
                            tg.HapticFeedback.notificationOccurred('error');
                            setFeedback('failure');
                        } else {
                            newMultiplier = 1;
                            playIncorrect();
                            tg.HapticFeedback.notificationOccurred('warning');
                            setFeedback('failure');
                        }
                    }
                }

                if (state.activeBonus === 'Safe Zone') {
                    dispatch({ type: 'DECREASE_SAFE_ZONE' });
                    if (state.safeZoneRolls <= 1) {
                        dispatch({ type: 'DEACTIVATE_BONUS' });
                    }
                }

                dispatch({
                    type: 'UPDATE_SCORE',
                    newScore: newScore,
                    change: newScore - state.score,
                    multiplier: newMultiplier,
                });

                // Bonus activation logic
                if (state.rollCount % 4 === 3 && !state.activeBonus) {
                    const bonusRoll = Math.random();
                    if (bonusRoll < 0.4) {
                        dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Safe Zone' });
                        playBonus();
                    } else if (bonusRoll < 0.8) {
                        dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Time Freeze' });
                        freezeTimer();
                        addTime(7);
                        playBonus();
                    }
                }
            }, [state, rollDice, playCorrect, playIncorrect, playBonus, freezeTimer, addTime]);

            const handleAllIn = useCallback(async (pred) => {
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                let newScore = state.score;
                if ((pred === 'less' && sum < 7) || (pred === 'more' && sum > 7)) {
                    newScore *= 2;
                    playCorrect();
                    tg.HapticFeedback.notificationOccurred('success');
                    setFeedback('success');
                } else {
                    newScore = 0; // Lose all score
                    playIncorrect();
                    tg.HapticFeedback.notificationOccurred('error');
                    setFeedback('failure');
                }
                dispatch({
                    type: 'UPDATE_SCORE',
                    newScore: newScore,
                    change: newScore - state.score,
                    multiplier: 1,
                });
                dispatch({ type: 'GAME_OVER' });
            }, [state, rollDice, playCorrect, playIncorrect]);

            useEffect(() => {
                if (feedback) {
                    const timer = setTimeout(() => setFeedback(null), 500);
                    return () => clearTimeout(timer);
                }
            }, [feedback]);

            useEffect(() => {
                if (state.gameState === 'gameOver') {
                    if (state.score > state.highScore) {
                        dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: state.score });
                        saveHighScore(state.score);
                    }
                }
            }, [state.gameState, state.score, state.highScore]);

            const saveHighScore = useCallback(async (score) => {
                try {
                    await new Promise((resolve, reject) => {
                        tg.CloudStorage.setItem("highScore", score.toString(), (error) => {
                            if (error) reject(error);
                            else resolve();
                        });
                    });
                } catch (error) {
                    console.error("Failed to save high score:", error);
                    tg.showAlert("Failed to save high score. Your progress may not be saved.");
                }
            }, []);

            const startGame = useCallback(() => {
                setShowTutorial(false);
                dispatch({ type: 'START_GAME' });
                startTimer();
            }, [startTimer]);

            const renderGameContent = useMemo(() => {
                switch (state.gameState) {
                    case 'ready':
                        return (
                            <div className="text-center">
                                <button 
                                    onClick={startGame}
                                    className="retro-button"
                                >
                                    START GAME
                                </button>
                            </div>
                        );
                    case 'playing':
                    case 'allIn':
                        return (
                            <div className="text-center retro-text">
                                <div className="timer-bar">
                                    <div 
                                        className="timer-fill" 
                                        style={{ 
                                            animationDuration: `${timeLeft}s`,
                                            animationPlayState: isFrozen ? 'paused' : 'running'
                                        }}
                                    ></div>
                                </div>
                                <ScoreDisplay 
                                    score={state.score} 
                                    multiplier={state.multiplier} 
                                    scoreChange={state.scoreChange}
                                    highScore={state.highScore}
                                />
                                <div className="dice-container">
                                    <DiceDisplay value={state.dice1} rolling={state.isRolling} />
                                    <DiceDisplay value={state.dice2} rolling={state.isRolling} />
                                </div>
                                {state.lastRollResult && (
                                    <div className="retro-message">
                                        LAST ROLL: {state.lastRollResult}
                                    </div>
                                )}
                                <div className="roll-history">
                                    {state.recentRolls.map((roll, index) => (
                                        <div key={index} className="roll-history-item">
                                            {roll}
                                        </div>
                                    ))}
                                </div>
                                <div className="mb-4">
                                    {state.activeBonus && (
                                        <BonusDisplay bonus={state.activeBonus} safeZoneRolls={state.safeZoneRolls} />
                                    )}
                                </div>
                                {state.gameState === 'allIn' && (
                                    <div className="retro-message">
                                        ALL-IN ROUND! DOUBLE OR LOSE ALL YOUR SCORE!
                                    </div>
                                )}
                                <div className="flex justify-center space-x-4">
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: Less than 7" : "Predict less than 7"}
                                        className="retro-button"
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('less') : handlePrediction('less')}
                                        disabled={state.isRolling}
                                    >
                                        LESS THAN 7
                                    </button>
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: More than 7" : "Predict more than 7"}
                                        className="retro-button"
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('more') : handlePrediction('more')}
                                        disabled={state.isRolling}
                                    >
                                        MORE THAN 7
                                    </button>
                                </div>
                            </div>
                        );
                    case 'gameOver':
                        return (
                            <div className="text-center retro-text">
                                <div className="retro-message">GAME OVER!</div>
                                <div className="retro-message">FINAL SCORE: {Math.floor(state.score)}</div>
                                <div className="retro-message">HIGH SCORE: {Math.floor(state.highScore)}</div>
                                <button 
                                    onClick={startGame}
                                    className="retro-button"
                                >
                                    PLAY AGAIN
                                </button>
                            </div>
                        );
                    default:
                        return null;
                }
            }, [state, timeLeft, isFrozen, startGame, handleAllIn, handlePrediction]);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <h1 className="text-4xl mb-6 text-yellow-400 retro-text">🎲 DICE PROPHET 🎲</h1>
                    {showTutorial && <Tutorial onComplete={startGame} />}
                    {renderGameContent}
                    {feedback === 'success' && <div className="feedback success"></div>}
                    {feedback === 'failure' && <div className="feedback failure"></div>}
                </div>
            );
        }

        // Error Boundary component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                console.error("Caught an error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="text-center text-red-500">
                            <h2 className="text-2xl font-bold mb-4">Oops! Something went wrong.</h2>
                            <p>Please try refreshing the page or contact support if the problem persists.</p>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        ReactDOM.render(
            <React.StrictMode>
                <ErrorBoundary>
                    <DiceProphet />
                </ErrorBoundary>
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
