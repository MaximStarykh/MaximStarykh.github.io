<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Prophet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.7.2/prop-types.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dice-roll {
            animation: roll 0.5s ease-out;
        }
        .bonus-appear {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        .scale-in {
            animation: scaleIn 0.3s ease-in-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .slide-in {
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const tg = window.Telegram.WebApp;

        // Constants
        const INITIAL_TIME = 60;
        const BONUS_ACTIVATION_INTERVAL = 5;
        const MAX_MULTIPLIER = 10;
        const ROLL_ANIMATION_DURATION = 500;

        // Utility functions
        const secureRandom = () => {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] / (0xffffffff + 1);
        };

        const rollDie = () => Math.floor(secureRandom() * 6) + 1;

        const DiceDisplay = React.memo(({ value, rolling }) => (
            <div className={`w-20 h-20 bg-white dark:bg-gray-600 rounded-lg flex items-center justify-center text-4xl font-bold shadow-lg ${rolling ? 'dice-roll' : ''}`}>
                {value}
            </div>
        ));

        DiceDisplay.propTypes = {
            value: PropTypes.number.isRequired,
            rolling: PropTypes.bool.isRequired
        };

        const BonusDisplay = React.memo(({ bonus }) => (
            <div className="px-3 py-2 bg-purple-500 text-white rounded-full flex items-center justify-center bonus-appear">
                <i className={`fas ${bonus === 'Safe Zone' ? 'fa-shield-alt' : 'fa-clock'} mr-2`}></i>
                {bonus}
            </div>
        ));

        BonusDisplay.propTypes = {
            bonus: PropTypes.string.isRequired
        };

        function DiceProphet() {
            const [state, setState] = React.useState({
                dice1: 1,
                dice2: 1,
                score: 0,
                highScore: 0,
                multiplier: 1,
                streak: 0,
                timeLeft: INITIAL_TIME,
                activeBonus: null,
                gameState: 'ready',
                prediction: null,
                safeZoneRolls: 0,
                isRolling: false,
                rollCount: 0,
                lastRollResult: null,
                recentRolls: [],
                scoreChange: 0
            });

            React.useEffect(() => {
                tg.ready();
                tg.expand();
                document.body.className = tg.colorScheme;
                
                tg.CloudStorage.getItem("highScore", (error, value) => {
                    if (!error && value) {
                        setState(prevState => ({ ...prevState, highScore: parseInt(value) }));
                    }
                });

                tg.MainButton.setText("Start Game");
                tg.MainButton.onClick(() => {
                    if (state.gameState === 'ready') {
                        setState(prevState => ({ ...prevState, gameState: 'playing' }));
                        tg.MainButton.hide();
                    }
                });
                tg.MainButton.show();

                return () => {
                    tg.MainButton.offClick();
                };
            }, []);

            React.useEffect(() => {
                if (state.gameState === 'playing') {
                    const timer = setInterval(() => {
                        setState(prevState => {
                            if (prevState.timeLeft <= 1) {
                                clearInterval(timer);
                                return { ...prevState, timeLeft: 0, gameState: 'finished' };
                            }
                            return { ...prevState, timeLeft: prevState.timeLeft - 1 };
                        });
                    }, 1000);

                    return () => clearInterval(timer);
                }
            }, [state.gameState]);

            const rollDice = React.useCallback(() => {
                setState(prevState => ({ ...prevState, isRolling: true, rollCount: prevState.rollCount + 1 }));
                tg.HapticFeedback.impactOccurred('medium');
                setTimeout(() => {
                    const newDice1 = rollDie();
                    const newDice2 = rollDie();
                    const newResult = newDice1 + newDice2;
                    setState(prevState => ({
                        ...prevState,
                        dice1: newDice1,
                        dice2: newDice2,
                        isRolling: false,
                        lastRollResult: newResult,
                        recentRolls: [newResult, ...prevState.recentRolls.slice(0, 4)]
                    }));
                }, ROLL_ANIMATION_DURATION);
            }, []);

            const handlePrediction = React.useCallback((pred) => {
                setState(prevState => ({ ...prevState, prediction: pred }));
                rollDice();
            }, [rollDice]);

            const activateBonus = React.useCallback((bonus) => {
                setState(prevState => ({
                    ...prevState,
                    activeBonus: bonus,
                    safeZoneRolls: bonus === 'Safe Zone' ? 3 : prevState.safeZoneRolls,
                    timeLeft: bonus === 'Time Freeze' ? prevState.timeLeft + 5 : prevState.timeLeft
                }));
                tg.HapticFeedback.notificationOccurred('success');
            }, []);

            React.useEffect(() => {
                if (state.prediction !== null && !state.isRolling) {
                    const sum = state.dice1 + state.dice2;
                    let isCorrect = (state.prediction === 'less' && sum < 7) || (state.prediction === 'more' && sum > 7);
                    
                    setState(prevState => {
                        let newScore = prevState.score;
                        let newMultiplier = prevState.multiplier;
                        let newStreak = prevState.streak;
                        let scoreChange = 0;
                        
                        if (isCorrect) {
                            const pointsEarned = 100 * prevState.multiplier;
                            newScore += pointsEarned;
                            scoreChange = pointsEarned;
                            newMultiplier = Math.min(prevState.multiplier + 1, MAX_MULTIPLIER);
                            newStreak++;
                            tg.HapticFeedback.notificationOccurred('success');
                        } else if (sum === 7) {
                            if (prevState.activeBonus !== 'Safe Zone') {
                                newScore = 0;
                                scoreChange = -prevState.score;
                                newMultiplier = 1;
                                newStreak = 0;
                                tg.HapticFeedback.notificationOccurred('error');
                            }
                        } else {
                            if (prevState.activeBonus !== 'Safe Zone') {
                                newMultiplier = 1;
                                newStreak = 0;
                                tg.HapticFeedback.notificationOccurred('warning');
                            }
                        }

                        let newActiveBonus = prevState.activeBonus;
                        let newSafeZoneRolls = prevState.safeZoneRolls;
                        if (prevState.activeBonus === 'Safe Zone') {
                            newSafeZoneRolls--;
                            if (newSafeZoneRolls <= 0) {
                                newActiveBonus = null;
                                newSafeZoneRolls = 0;
                            }
                        }

                        if (prevState.rollCount % BONUS_ACTIVATION_INTERVAL === 0 && !prevState.activeBonus) {
                            newActiveBonus = Math.random() < 0.5 ? 'Safe Zone' : 'Time Freeze';
                            if (newActiveBonus === 'Safe Zone') {
                                newSafeZoneRolls = 3;
                            }
                        }

                        return {
                            ...prevState,
                            score: newScore,
                            multiplier: newMultiplier,
                            streak: newStreak,
                            scoreChange,
                            prediction: null,
                            activeBonus: newActiveBonus,
                            safeZoneRolls: newSafeZoneRolls
                        };
                    });
                }
            }, [state.dice1, state.dice2, state.prediction, state.isRolling]);

            const handleAllIn = React.useCallback((pred) => {
                setState(prevState => ({ ...prevState, prediction: pred, gameState: 'allInResult' }));
                rollDice();
            }, [rollDice]);

            React.useEffect(() => {
                if (state.gameState === 'allInResult' && !state.isRolling) {
                    const sum = state.dice1 + state.dice2;
                    const isCorrect = (state.prediction === 'less' && sum < 7) || (state.prediction === 'more' && sum > 7);
                    
                    setState(prevState => ({
                        ...prevState,
                        score: isCorrect ? prevState.score * 2 : 0,
                        scoreChange: isCorrect ? prevState.score : -prevState.score,
                        gameState: 'gameOver'
                    }));

                    tg.HapticFeedback.notificationOccurred(isCorrect ? 'success' : 'error');
                }
            }, [state.gameState, state.isRolling, state.dice1, state.dice2, state.prediction]);

            React.useEffect(() => {
                if (state.gameState === 'gameOver') {
                    if (state.score > state.highScore) {
                        setState(prevState => ({ ...prevState, highScore: state.score }));
                        tg.CloudStorage.setItem("highScore", state.score.toString());
                    }
                    tg.MainButton.setText("Play Again");
                    tg.MainButton.show();
                    tg.MainButton.onClick(() => {
                        setState(prevState => ({
                            ...prevState,
                            dice1: 1,
                            dice2: 1,
                            score: 0,
                            multiplier: 1,
                            streak: 0,
                            timeLeft: INITIAL_TIME,
                            activeBonus: null,
                            gameState: 'playing',
                            prediction: null,
                            safeZoneRolls: 0,
                            rollCount: 0,
                            lastRollResult: null,
                            recentRolls: [],
                            scoreChange: 0
                        }));
                        tg.MainButton.hide();
                    });
                }
            }, [state.gameState, state.score, state.highScore]);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-4">
                    <h1 className="text-4xl font-bold mb-6 text-blue-600 dark:text-blue-400">Dice Prophet</h1>
                    
                    {state.gameState === 'ready' && (
                        <div className="text-center">
                            <p className="mb-4 text-lg">Predict the dice roll outcome and earn points!</p>
                            <p className="text-sm text-gray-600 dark:text-gray-400">Press "Start Game" to begin your prophecy.</p>
                        </div>
                    )}

                    {state.gameState === 'playing' && (
                        <div className="text-center">
                            <div className="text-3xl font-bold mb-4">
                                <i className="far fa-clock mr-2"></i>{state.timeLeft}s
                            </div>
                            <div className="text-2xl mb-4">
                                Score: <span className="text-green-500 font-bold">{Math.floor(state.score)}</span>
                                <span className="text-sm ml-2">(×{state.multiplier})</span>
                                {state.scoreChange !== 0 && (
                                    <span className={`ml-2 ${state.scoreChange > 0 ? 'text-green-500' : 'text-red-500'} slide-in`}>
                                        {state.scoreChange > 0 ? '+' : ''}{state.scoreChange}
                                    </span>
                                )}
                            </div>
                            <div className="text-lg mb-4">
                                Streak: <span className="text-yellow-500 font-bold">{state.streak}</span>
                            </div>
                            <div className="flex justify-center space-x-6 mb-6">
                                <DiceDisplay value={state.dice1} rolling={state.isRolling} />
                                <DiceDisplay value={state.dice2} rolling={state.isRolling} />
                            </div>
                            {{state.lastRollResult && (
                                <div className={`text-2xl mb-4 font-bold ${state.lastRollResult < 7 ? 'text-red-500' : state.lastRollResult > 7 ? 'text-green-500' : 'text-yellow-500'} fade-in`}>
                                    Last Roll: {state.lastRollResult}
                                </div>
                            )}
                            <div className="flex justify-center space-x-2 mb-4">
                                {state.recentRolls.map((roll, index) => (
                                    <div key={index} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${roll < 7 ? 'bg-red-500' : roll > 7 ? 'bg-green-500' : 'bg-yellow-500'} text-white`}>
                                        {roll}
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-center space-x-4 mb-6">
                                <button
                                    className={`px-6 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''}`}
                                    onClick={() => handlePrediction('less')}
                                    disabled={state.isRolling}
                                >
                                    <i className="fas fa-arrow-down mr-2"></i>Less than 7
                                </button>
                                <button
                                    className={`px-6 py-3 bg-yellow-500 text-white rounded-full hover:bg-yellow-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''}`}
                                    onClick={() => handlePrediction('seven')}
                                    disabled={state.isRolling}
                                >
                                    Exactly 7
                                </button>
                                <button
                                    className={`px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''}`}
                                    onClick={() => handlePrediction('more')}
                                    disabled={state.isRolling}
                                >
                                    <i className="fas fa-arrow-up mr-2"></i>More than 7
                                </button>
                            </div>
                            {state.activeBonus && (
                                <div className="mb-4 scale-in">
                                    <BonusDisplay bonus={state.activeBonus} />
                                    {state.activeBonus === 'Safe Zone' && (
                                        <div className="text-purple-500 mt-2">
                                            <i className="fas fa-shield-alt mr-2"></i>
                                            Safe Zone: {state.safeZoneRolls} rolls left
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {state.gameState === 'finished' && (
                        <div className="text-center">
                            <div className="text-3xl font-bold mb-6">Time's up! Final Score: {Math.floor(state.score)}</div>
                            <div className="text-xl mb-6">Do you want to go All-In?</div>
                            <div className="flex justify-center space-x-6">
                                <button
                                    className="px-6 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors duration-200 pulse"
                                    onClick={() => handleAllIn('less')}
                                >
                                    <i className="fas fa-dice mr-2"></i>All-In: Less than 7
                                </button>
                                <button
                                    className="px-6 py-3 bg-yellow-500 text-white rounded-full hover:bg-yellow-600 transition-colors duration-200 pulse"
                                    onClick={() => handleAllIn('seven')}
                                >
                                    <i className="fas fa-dice mr-2"></i>All-In: Exactly 7
                                </button>
                                <button
                                    className="px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors duration-200 pulse"
                                    onClick={() => handleAllIn('more')}
                                >
                                    <i className="fas fa-dice mr-2"></i>All-In: More than 7
                                </button>
                            </div>
                        </div>
                    )}

                    {state.gameState === 'allInResult' && (
                        <div className="text-3xl font-bold mb-6 animate-pulse">Rolling...</div>
                    )}

                    {state.gameState === 'gameOver' && (
                        <div className="text-center">
                            <div className="text-4xl font-bold mb-6 fade-in">Game Over!</div>
                            <div className="text-3xl mb-4 fade-in">Final Score: {Math.floor(state.score)}</div>
                            <div className="text-2xl mb-6 fade-in">High Score: {Math.floor(state.highScore)}</div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(
            <React.StrictMode>
                <DiceProphet />
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
