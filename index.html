<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Prophet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dice-roll {
            animation: roll 0.5s ease-out;
        }
        .bonus-appear {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        .scale-in {
            animation: scaleIn 0.3s ease-in-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .slide-in {
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const tg = window.Telegram.WebApp;

        function DiceProphet() {
            const [dice1, setDice1] = React.useState(1);
            const [dice2, setDice2] = React.useState(1);
            const [score, setScore] = React.useState(0);
            const [highScore, setHighScore] = React.useState(0);
            const [multiplier, setMultiplier] = React.useState(1);
            const [streak, setStreak] = React.useState(0);
            const [timeLeft, setTimeLeft] = React.useState(60);
            const [activeBonus, setActiveBonus] = React.useState(null);
            const [gameState, setGameState] = React.useState('ready');
            const [prediction, setPrediction] = React.useState(null);
            const [safeZoneRolls, setSafeZoneRolls] = React.useState(0);
            const [isRolling, setIsRolling] = React.useState(false);
            const [rollCount, setRollCount] = React.useState(0);
            const [lastRollResult, setLastRollResult] = React.useState(null);
            const [recentRolls, setRecentRolls] = React.useState([]);
            const [scoreChange, setScoreChange] = React.useState(0);

            React.useEffect(() => {
                tg.ready();
                tg.expand();
                document.body.className = tg.colorScheme;
                
                tg.CloudStorage.getItem("highScore", (error, value) => {
                    if (!error && value) {
                        setHighScore(parseInt(value));
                    }
                });

                tg.MainButton.setText("Start Game");
                tg.MainButton.onClick(() => {
                    if (gameState === 'ready') {
                        setGameState('playing');
                        tg.MainButton.hide();
                    }
                });
                tg.MainButton.show();

                return () => {
                    tg.MainButton.offClick();
                };
            }, []);

            React.useEffect(() => {
                if (gameState === 'playing') {
                    const timer = setInterval(() => {
                        setTimeLeft((prevTime) => {
                            if (prevTime <= 1) {
                                clearInterval(timer);
                                setGameState('finished');
                                return 0;
                            }
                            return prevTime - 1;
                        });
                    }, 1000);

                    return () => clearInterval(timer);
                }
            }, [gameState]);

            const rollDice = () => {
                setIsRolling(true);
                setRollCount((prevCount) => prevCount + 1);
                tg.HapticFeedback.impactOccurred('medium');
                setTimeout(() => {
                    const newDice1 = Math.floor(Math.random() * 6) + 1;
                    const newDice2 = Math.floor(Math.random() * 6) + 1;
                    setDice1(newDice1);
                    setDice2(newDice2);
                    setIsRolling(false);
                    const newResult = newDice1 + newDice2;
                    setLastRollResult(newResult);
                    setRecentRolls(prev => [newResult, ...prev.slice(0, 4)]);
                }, 500);
            };

            const handlePrediction = (pred) => {
                setPrediction(pred);
                rollDice();
            };

            const activateBonus = (bonus) => {
                setActiveBonus(bonus);
                if (bonus === 'Safe Zone') {
                    setSafeZoneRolls(3);
                } else if (bonus === 'Time Freeze') {
                    setTimeLeft(prev => prev + 5);
                }
                tg.HapticFeedback.notificationOccurred('success');
            };

            React.useEffect(() => {
                if (prediction !== null && !isRolling) {
                    const sum = dice1 + dice2;
                    let isCorrect = false;
                    let newScore = score;
                    
                    if ((prediction === 'less' && sum < 7) || (prediction === 'more' && sum > 7)) {
                        isCorrect = true;
                        const pointsEarned = 100 * multiplier;
                        newScore += pointsEarned;
                        setScore(newScore);
                        setScoreChange(pointsEarned);
                        setMultiplier(prev => prev + 1);
                        setStreak(prev => prev + 1);
                        tg.HapticFeedback.notificationOccurred('success');
                    } else if (sum === 7) {
                        if (activeBonus !== 'Safe Zone') {
                            newScore = 0;
                            setScore(0);
                            setScoreChange(-score);
                            setMultiplier(1);
                            setStreak(0);
                            tg.HapticFeedback.notificationOccurred('error');
                        }
                    } else {
                        if (activeBonus !== 'Safe Zone') {
                            setMultiplier(1);
                            setStreak(0);
                            setScoreChange(0);
                            tg.HapticFeedback.notificationOccurred('warning');
                        }
                    }

                    if (activeBonus === 'Safe Zone') {
                        setSafeZoneRolls(prev => {
                            if (prev <= 1) {
                                setActiveBonus(null);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }

                    if (rollCount % 5 === 0 && !activeBonus) {
                        const newBonus = Math.random() < 0.5 ? 'Safe Zone' : 'Time Freeze';
                        activateBonus(newBonus);
                    }

                    setPrediction(null);
                }
            }, [dice1, dice2, prediction, multiplier, activeBonus, isRolling, rollCount, score]);

            const handleAllIn = (pred) => {
                setPrediction(pred);
                rollDice();
                setGameState('allInResult');
            };

            React.useEffect(() => {
                if (gameState === 'allInResult' && !isRolling) {
                    const sum = dice1 + dice2;
                    if ((prediction === 'less' && sum < 7) || (prediction === 'more' && sum > 7)) {
                        setScore(prev => prev * 2);
                        setScoreChange(score);
                        tg.HapticFeedback.notificationOccurred('success');
                    } else {
                        setScore(0);
                        setScoreChange(-score);
                        tg.HapticFeedback.notificationOccurred('error');
                    }
                    setGameState('gameOver');
                }
            }, [dice1, dice2, prediction, gameState, isRolling, score]);

            React.useEffect(() => {
                if (gameState === 'gameOver') {
                    if (score > highScore) {
                        setHighScore(score);
                        tg.CloudStorage.setItem("highScore", score.toString());
                    }
                    tg.MainButton.setText("Play Again");
                    tg.MainButton.show();
                    tg.MainButton.onClick(restartGame);
                }
            }, [gameState, score, highScore]);

            const restartGame = () => {
                setDice1(1);
                setDice2(1);
                setScore(0);
                setMultiplier(1);
                setStreak(0);
                setTimeLeft(60);
                setActiveBonus(null);
                setGameState('playing');
                setPrediction(null);
                setSafeZoneRolls(0);
                setRollCount(0);
                setLastRollResult(null);
                setRecentRolls([]);
                setScoreChange(0);
                tg.MainButton.hide();
            };

            const DiceDisplay = ({ value, rolling }) => (
                <div className={`w-20 h-20 bg-white dark:bg-gray-600 rounded-lg flex items-center justify-center text-4xl font-bold shadow-lg ${rolling ? 'dice-roll' : ''}`}>
                    {value}
                </div>
            );

            const BonusDisplay = ({ bonus }) => (
                <div className="px-3 py-2 bg-purple-500 text-white rounded-full flex items-center justify-center bonus-appear">
                    <i className={`fas ${bonus === 'Safe Zone' ? 'fa-shield-alt' : 'fa-clock'} mr-2`}></i>
                    {bonus}
                </div>
            );

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 p-4">
                    <h1 className="text-4xl font-bold mb-6 text-blue-600 dark:text-blue-400">Dice Prophet</h1>
                    
                    {gameState === 'ready' && (
                        <div className="text-center">
                            <p className="mb-4 text-lg">Predict the dice roll outcome and earn points!</p>
                            <p className="text-sm text-gray-600 dark:text-gray-400">Press "Start Game" to begin your prophecy.</p>
                        </div>
                    )}

                    {gameState === 'playing' && (
                        <div className="text-center">
                            <div className="text-3xl font-bold mb-4">
                                <i className="far fa-clock mr-2"></i>{timeLeft}s
                            </div>
                            <div className="text-2xl mb-4">
                                Score: <span className="text-green-500 font-bold">{Math.floor(score)}</span>
                                <span className="text-sm ml-2">(×{multiplier})</span>
                                {scoreChange !== 0 && (
                                    <span className={`ml-2 ${scoreChange > 0 ? 'text-green-500' : 'text-red-500'} slide-in`}>
                                        {scoreChange > 0 ? '+' : ''}{scoreChange}
                                    </span>
                                )}
                            </div>
                            <div className="text-lg mb-4">
                                Streak: <span className="text-yellow-500 font-bold">{streak}</span>
                            </div>
                            <div className="flex justify-center space-x-6 mb-6">
                                <DiceDisplay value={dice1} rolling={isRolling} />
                                <DiceDisplay value={dice2} rolling={isRolling} />
                            </div>
                            {lastRollResult && (
                                <div className={`text-2xl mb-4 font-bold ${lastRollResult < 7 ? 'text-red-500' : lastRollResult > 7 ? 'text-green-500' : 'text-yellow-500'} fade-in`}>
                                    Last Roll: {lastRollResult}
                                </div>
                            )}
                            <div className="flex justify-center space-x-2 mb-4">
                                {recentRolls.map((roll, index) => (
                                    <div key={index} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${roll < 7 ? 'bg-red-500' : roll > 7 ? 'bg-green-500' : 'bg-yellow-500'} text-white`}>
                                        {roll}
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-center space-x-4 mb-6">
                                <button
                                    className={`px-6 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!isRolling ? 'pulse' : ''}`}
                                    onClick={() => handlePrediction('less')}
                                    disabled={isRolling}
                                >
                                    <i className="fas fa-arrow-down mr-2"></i>Less than 7
                                </button>
                                <button
                                    className={`px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!isRolling ? 'pulse' : ''}`}
                                    onClick={() => handlePrediction('more')}
                                    disabled={isRolling}
                                >
                                    <i className="fas fa-arrow-up mr-2"></i>More than 7
                                </button>
                            </div>
                            {activeBonus && (
                                <div className="mb-4 scale-in">
                                    <BonusDisplay bonus={activeBonus} />
                                    {activeBonus === 'Safe Zone' && (
                                        <div className="text-purple-500 mt-2">
                                            <i className="fas fa-shield-alt mr-2"></i>
                                            Safe Zone: {safeZoneRolls} rolls left
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {gameState === 'finished' && (
                        <div className="text-center">
                            <div className="text-3xl font-bold mb-6">Time's up! Final Score: {Math.floor(score)}</div>
                            <div className="text-xl mb-6">Do you want to go All-In?</div>
                            <div className="flex justify-center space-x-6">
                                <button
                                    className="px-6 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors duration-200 pulse"
                                    onClick={() => handleAllIn('less')}
                                >
                                    <i className="fas fa-dice mr-2"></i>All-In: Less than 7
                                </button>
                                <button
                                    className="px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors duration-200 pulse"
                                    onClick={() => handleAllIn('more')}
                                >
                                    <i className="fas fa-dice mr-2"></i>All-In: More than 7
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState === 'allInResult' && (
                        <div className="text-3xl font-bold mb-6 animate-pulse">Rolling...</div>
                    )}

                    {gameState === 'gameOver' && (
                        <div className="text-center">
                            <div className="text-4xl font-bold mb-6 fade-in">Game Over!</div>
                            <div className="text-3xl mb-4 fade-in">Final Score: {Math.floor(score)}</div>
                            <div className="text-2xl mb-6 fade-in">High Score: {Math.floor(highScore)}</div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(
            <React.StrictMode>
                <DiceProphet />
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
