<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice Prophet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- React and Babel -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dice-roll {
            animation: roll 0.5s ease-out;
        }
        .bonus-appear {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        .scale-in {
            animation: scaleIn 0.3s ease-in-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .slide-in {
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useReducer, useRef } = React;
        const tg = window.Telegram.WebApp;

        // Sound effects
        const useSound = () => {
            const audioContext = React.useMemo(() => new (window.AudioContext || window.webkitAudioContext)(), []);
            const playSound = useCallback((frequency, duration) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, audioContext.currentTime + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration - 0.01);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + duration);
            }, [audioContext]);

            return {
                playDiceRoll: useCallback(() => playSound(300, 0.3), [playSound]),
                playCorrect: useCallback(() => playSound(440, 0.2), [playSound]),
                playIncorrect: useCallback(() => playSound(220, 0.2), [playSound]),
                playBonus: useCallback(() => playSound(660, 0.3), [playSound])
            };
        };

        // Game timer hook
        const useGameTimer = (initialTime) => {
            const [timeLeft, setTimeLeft] = useState(initialTime);
            const [isFrozen, setIsFrozen] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                if (isFrozen) return;
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => Math.max(prev - 1, 0));
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, [isFrozen]);

            const addTime = useCallback((seconds) => {
                setTimeLeft(prev => prev + seconds);
            }, []);

            const freezeTimer = useCallback(() => {
                setIsFrozen(true);
                setTimeout(() => setIsFrozen(false), 5000);
            }, []);

            return { timeLeft, addTime, freezeTimer, isFrozen };
        };

        // Game reducer
        const initialState = {
            dice1: 1,
            dice2: 1,
            score: 0,
            highScore: 0,
            multiplier: 1,
            activeBonus: null,
            gameState: 'ready',
            safeZoneRolls: 0,
            rollCount: 0,
            lastRollResult: null,
            recentRolls: [],
            scoreChange: 0,
            isRolling: false,
        };

        const gameReducer = (state, action) => {
            switch (action.type) {
                case 'START_GAME':
                    return { ...initialState, gameState: 'playing', highScore: state.highScore };
                case 'END_GAME':
                    return { ...state, gameState: 'allIn' };
                case 'GAME_OVER':
                    return { ...state, gameState: 'gameOver' };
                case 'ROLL_DICE':
                    return {
                        ...state,
                        dice1: action.dice1,
                        dice2: action.dice2,
                        lastRollResult: action.dice1 + action.dice2,
                        recentRolls: [action.dice1 + action.dice2, ...state.recentRolls.slice(0, 4)],
                        rollCount: state.rollCount + 1,
                        isRolling: false,
                    };
                case 'UPDATE_SCORE':
                    return {
                        ...state,
                        score: action.newScore,
                        scoreChange: action.change,
                        multiplier: action.multiplier,
                    };
                case 'ACTIVATE_BONUS':
                    return {
                        ...state,
                        activeBonus: action.bonus,
                        safeZoneRolls: action.bonus === 'Safe Zone' ? 3 : state.safeZoneRolls,
                    };
                case 'DEACTIVATE_BONUS':
                    return { ...state, activeBonus: null, safeZoneRolls: 0 };
                case 'UPDATE_HIGH_SCORE':
                    return { ...state, highScore: action.highScore };
                case 'SET_ROLLING':
                    return { ...state, isRolling: action.isRolling };
                case 'DECREASE_SAFE_ZONE':
                    return { ...state, safeZoneRolls: state.safeZoneRolls - 1 };
                default:
                    return state;
            }
        };

        // Memoized components
        const DiceDisplay = React.memo(({ value, rolling }) => (
            <div
                className={`w-20 h-20 bg-white dark:bg-gray-600 rounded-lg flex items-center justify-center text-4xl font-bold shadow-lg ${rolling ? 'dice-roll' : ''}`}
                aria-label={`Dice showing ${value}`}
                role="img"
            >
                {value}
            </div>
        ));

        const BonusDisplay = React.memo(({ bonus, safeZoneRolls }) => (
            <div className="mb-4 scale-in">
                <div className="px-3 py-2 bg-purple-500 text-white rounded-full flex items-center justify-center bonus-appear">
                    <i className={`fas ${bonus === 'Safe Zone' ? 'fa-shield-alt' : 'fa-clock'} mr-2`} aria-hidden="true"></i>
                    {bonus}
                    {bonus === 'Safe Zone' && ` (${safeZoneRolls} rolls left)`}
                </div>
            </div>
        ));

        const ScoreDisplay = React.memo(({ score, multiplier, scoreChange, highScore }) => (
            <div className="text-center">
                <div className="text-3xl mb-2">
                    Score: <span className="text-green-500 font-bold">{Math.floor(score)}</span>
                    {scoreChange !== 0 && (
                        <span className={`ml-2 ${scoreChange > 0 ? 'text-green-500' : 'text-red-500'} slide-in`}>
                            {scoreChange > 0 ? '+' : ''}{Math.floor(scoreChange)}
                        </span>
                    )}
                </div>
                <div className="text-xl mb-2">
                    Multiplier: <span className="text-blue-500 font-bold">×{multiplier}</span>
                </div>
                <div className="text-lg">
                    High Score: <span className="text-purple-500 font-bold">{Math.floor(highScore)}</span>
                </div>
            </div>
        ));

        const Tutorial = ({ onComplete }) => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const slides = [
                <div className="text-center">
                    <h2 className="text-2xl font-bold mb-4">Welcome to Dice Prophet!</h2>
                    <p className="mb-4">Predict the future, master the dice, and become a legend!</p>
                    <div className="text-left">
                        <p className="mb-2"><i className="fas fa-dice text-blue-500 mr-2"></i> Guess if the sum will be less or more than 7</p>
                        <p className="mb-2"><i className="fas fa-chart-line text-green-500 mr-2"></i> Build your multiplier for bigger scores</p>
                        <p><i className="fas fa-exclamation-triangle text-yellow-500 mr-2"></i> But beware of the dreaded 7!</p>
                    </div>
                </div>,
                <div className="text-center">
                    <h2 className="text-2xl font-bold mb-4">Power-Ups and Bonuses</h2>
                    <div className="text-left">
                        <p className="mb-2"><i className="fas fa-shield-alt text-purple-500 mr-2"></i> Safe Zone: Protects you from losing your streak</p>
                        <p className="mb-2"><i className="fas fa-clock text-blue-500 mr-2"></i> Time Freeze: Stops the clock for extra gaming time</p>
                        <p><i className="fas fa-gift text-pink-500 mr-2"></i> Look out for surprise bonuses to boost your score!</p>
                    </div>
                </div>,
                <div className="text-center">
                    <h2 className="text-2xl font-bold mb-4">All or Nothing!</h2>
                    <p className="mb-4">When time runs out, you have one last chance to double your score!</p>
                    <div className="text-left">
                        <p className="mb-2"><i className="fas fa-trophy text-yellow-500 mr-2"></i> Go all-in for a shot at glory</p>
                        <p className="mb-2"><i className="fas fa-skull-crossbones text-red-500 mr-2"></i> But be careful, you could lose it all!</p>
                        <p><i className="fas fa-star text-purple-500 mr-2"></i> Do you have what it takes to be a Dice Prophet?</p>
                    </div>
                </div>
            ];

            return (
                <div className="fixed inset-0 bg-gray-900 bg-opacity-90 flex items-center justify-center z-50">
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg max-w-sm mx-auto relative">
                        {slides[currentSlide]}
                        <div className="mt-6 flex justify-between items-center">
                            <div className="flex space-x-2">
                                {slides.map((_, index) => (
                                    <div
                                        key={index}
                                        className={`w-2 h-2 rounded-full ${index === currentSlide ? 'bg-blue-500' : 'bg-gray-300'}`}
                                    ></div>
                                ))}
                            </div>
                            {currentSlide === slides.length - 1 ? (
                                <button
                                    onClick={onComplete}
                                    className="px-4 py-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors duration-200"
                                >
                                    Start Game
                                </button>
                            ) : (
                                <button
                                    onClick={() => setCurrentSlide(prev => prev + 1)}
                                    className="px-4 py-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors duration-200"
                                >
                                    Next
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        function DiceProphet() {
            const [state, dispatch] = useReducer(gameReducer, initialState);
            const { timeLeft, addTime, freezeTimer, isFrozen } = useGameTimer(60);
            const { playDiceRoll, playCorrect, playIncorrect, playBonus } = useSound();
            const [showTutorial, setShowTutorial] = useState(true);

            useEffect(() => {
                tg.ready();
                tg.expand();
                document.body.className = tg.colorScheme;

                const fetchHighScore = async () => {
                    try {
                        const value = await new Promise((resolve, reject) => {
                            tg.CloudStorage.getItem("highScore", (error, value) => {
                                if (error) reject(error);
                                else resolve(value);
                            });
                        });
                        if (value) {
                            dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: parseInt(value) });
                        }
                    } catch (error) {
                        console.error("Failed to retrieve high score:", error);
                        tg.showAlert("Failed to retrieve high score. Your progress may not be saved.");
                    }
                };

                fetchHighScore();
            }, []);

            useEffect(() => {
                if (timeLeft === 0 && state.gameState === 'playing') {
                    dispatch({ type: 'END_GAME' });
                }
            }, [timeLeft, state.gameState]);

            const rollDice = useCallback(() => {
                dispatch({ type: 'SET_ROLLING', isRolling: true });
                playDiceRoll();
                tg.HapticFeedback.impactOccurred('medium');
                return new Promise(resolve => {
                    setTimeout(() => {
                        const newDice1 = Math.floor(Math.random() * 6) + 1;
                        const newDice2 = Math.floor(Math.random() * 6) + 1;
                        dispatch({ type: 'ROLL_DICE', dice1: newDice1, dice2: newDice2 });
                        resolve({ dice1: newDice1, dice2: newDice2 });
                    }, 500);
                });
            }, [playDiceRoll]);

            const handlePrediction = useCallback(async (pred) => {
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                const isCorrect = (pred === 'less' && sum < 7) || (pred === 'more' && sum > 7);
                let newScore = state.score;
                let newMultiplier = state.multiplier;

                if (isCorrect) {
                    const basePoints = 100 * newMultiplier;
                    newScore += basePoints;
                    newMultiplier = Math.min(newMultiplier + 1, 12);
                    playCorrect();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    if (state.activeBonus === 'Safe Zone') {
                        playIncorrect();
                        tg.HapticFeedback.notificationOccurred('warning');
                    } else {
                        if (sum === 7) {
                            newScore = 0;
                            newMultiplier = 1;
                            playIncorrect();
                            tg.HapticFeedback.notificationOccurred('error');
                        } else {
                            newMultiplier = 1;
                            playIncorrect();
                            tg.HapticFeedback.notificationOccurred('warning');
                        }
                    }
                }

                if (state.activeBonus === 'Safe Zone') {
                    dispatch({ type: 'DECREASE_SAFE_ZONE' });
                    if (state.safeZoneRolls <= 1) {
                        dispatch({ type: 'DEACTIVATE_BONUS' });
                    }
                }

                dispatch({
                    type: 'UPDATE_SCORE',
                    newScore: newScore,
                    change: newScore - state.score,
                    multiplier: newMultiplier,
                });

                // Bonus activation logic
                if ((state.rollCount + 1) % 5 === 0 && !state.activeBonus) {
                    const bonusChance = Math.random();
                    if (bonusChance < 0.5) {
                        const bonusTypeChance = Math.random();
                        if (bonusTypeChance < 0.4) {
                            dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Safe Zone' });
                            playBonus();
                        } else if (bonusTypeChance < 0.8) {
                            dispatch({ type: 'ACTIVATE_BONUS', bonus: 'Time Freeze' });
                            freezeTimer();
                            addTime(5);
                            playBonus();
                        }
                    }
                }
            }, [state, rollDice, playCorrect, playIncorrect, playBonus, freezeTimer, addTime]);

            const handleAllIn = useCallback(async (pred) => {
                const { dice1, dice2 } = await rollDice();
                const sum = dice1 + dice2;
                let newScore = state.score;
                if ((pred === 'less' && sum < 7) || (pred === 'more' && sum > 7)) {
                    newScore *= 2;
                    playCorrect();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    newScore = 0;
                    playIncorrect();
                    tg.HapticFeedback.notificationOccurred('error');
                }
                dispatch({
                    type: 'UPDATE_SCORE',
                    newScore: newScore,
                    change: newScore - state.score,
                    multiplier: 1,
                });
                dispatch({ type: 'GAME_OVER' });
            }, [state, rollDice, playCorrect, playIncorrect]);

            useEffect(() => {
                if (state.gameState === 'gameOver') {
                    if (state.score > state.highScore) {
                        dispatch({ type: 'UPDATE_HIGH_SCORE', highScore: state.score });
                        saveHighScore(state.score);
                    }
                }
            }, [state.gameState, state.score, state.highScore]);

            const saveHighScore = useCallback(async (score) => {
                try {
                    await new Promise((resolve, reject) => {
                        tg.CloudStorage.setItem("highScore", score.toString(), (error) => {
                            if (error) reject(error);
                            else resolve();
                        });
                    });
                } catch (error) {
                    console.error("Failed to save high score:", error);
                    tg.showAlert("Failed to save high score. Your progress may not be saved.");
                }
            }, []);

            const startGame = useCallback(() => {
                setShowTutorial(false);
                dispatch({ type: 'START_GAME' });
            }, []);

            const renderGameContent = () => {
                switch (state.gameState) {
                    case 'ready':
                        return (
                            <div className="text-center">
                                <button
                                    onClick={startGame}
                                    className="px-6 py-3 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors duration-200 text-xl font-bold"
                                >
                                    Start Game
                                </button>
                            </div>
                        );
                    case 'playing':
                    case 'allIn':
                        return (
                            <div className="text-center">
                                <div className="text-3xl font-bold mb-4">
                                    <i className="far fa-clock mr-2" aria-hidden="true"></i>{timeLeft}s
                                    {isFrozen && <span className="ml-2 text-blue-500" role="img" aria-label="Frozen">❄️</span>}
                                </div>
                                <ScoreDisplay
                                    score={state.score}
                                    multiplier={state.multiplier}
                                    scoreChange={state.scoreChange}
                                    highScore={state.highScore}
                                />
                                <div className="flex justify-center space-x-6 my-6">
                                    <DiceDisplay value={state.dice1} rolling={state.isRolling} />
                                    <DiceDisplay value={state.dice2} rolling={state.isRolling} />
                                </div>
                                {state.lastRollResult && (
                                    <div className={`text-2xl mb-4 font-bold ${state.lastRollResult < 7 ? 'text-red-500' : state.lastRollResult > 7 ? 'text-green-500' : 'text-yellow-500'} fade-in`}>
                                        Last Roll: {state.lastRollResult}
                                    </div>
                                )}
                                <div className="flex justify-center space-x-2 mb-4">
                                    {state.recentRolls.map((roll, index) => (
                                        <div key={index} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${roll < 7 ? 'bg-red-500' : roll > 7 ? 'bg-green-500' : 'bg-yellow-500'} text-white`}>
                                            {roll}
                                        </div>
                                    ))}
                                </div>
                                <div className="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4 mb-6">
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: Less than 7" : "Predict less than 7"}
                                        className={`w-full sm:w-auto px-6 py-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''}`}
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('less') : handlePrediction('less')}
                                        disabled={state.isRolling}
                                    >
                                        <i className="fas fa-arrow-down mr-2" aria-hidden="true"></i>
                                        {state.gameState === 'allIn' ? "All-In: Less than 7" : "Less than 7"}
                                    </button>
                                    <button
                                        aria-label={state.gameState === 'allIn' ? "All-In: More than 7" : "Predict more than 7"}
                                        className={`w-full sm:w-auto px-6 py-3 bg-green-500 text-white rounded-full hover:bg-green-600 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${!state.isRolling ? 'pulse' : ''}`}
                                        onClick={() => state.gameState === 'allIn' ? handleAllIn('more') : handlePrediction('more')}
                                        disabled={state.isRolling}
                                    >
                                        <i className="fas fa-arrow-up mr-2" aria-hidden="true"></i>
                                        {state.gameState === 'allIn' ? "All-In: More than 7" : "More than 7"}
                                    </button>
                                </div>
                                {state.activeBonus && (
                                    <BonusDisplay bonus={state.activeBonus} safeZoneRolls={state.safeZoneRolls} />
                                )}
                                {state.gameState === 'allIn' && (
                                    <div className="text-xl font-bold text-yellow-500 mb-4">
                                        All-In Round! Double or lose all your score!
                                    </div>
                                )}
                            </div>
                        );
                    case 'gameOver':
                        return (
                            <div className="text-center">
                                <div className="text-4xl font-bold mb-6 fade-in">Game Over!</div>
                                <div className="text-3xl mb-4 fade-in">Final Score: {Math.floor(state.score)}</div>
                                <div className="text-2xl mb-6 fade-in">High Score: {Math.floor(state.highScore)}</div>
                                <button
                                    onClick={startGame}
                                    className="px-6 py-3 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors duration-200 text-xl font-bold"
                                >
                                    Play Again
                                </button>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <h1 className="text-4xl font-bold mb-6 text-blue-600 dark:text-blue-400">Dice Prophet</h1>
                    {showTutorial && <Tutorial onComplete={startGame} />}
                    {renderGameContent()}
                </div>
            );
        }

        // Error Boundary component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            componentDidCatch(error, errorInfo) {
                console.error("Caught an error:", error, errorInfo);
            }

            render() {
                if (this.state.hasError) {
                    return (
                        <div className="text-center text-red-500">
                            <h2 className="text-2xl font-bold mb-4">Oops! Something went wrong.</h2>
                            <p>Please try refreshing the page or contact support if the problem persists.</p>
                        </div>
                    );
                }

                return this.props.children;
            }
        }

        ReactDOM.render(
            <React.StrictMode>
                <ErrorBoundary>
                    <DiceProphet />
                </ErrorBoundary>
            </React.StrictMode>,
            document.getElementById('root')
        );
    </script>
</body>
</html>
