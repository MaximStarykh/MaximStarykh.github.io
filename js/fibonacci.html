    <script type='text/javascript'>

        function getRandomArbitary(min, max) {
            return Math.floor(min + Math.random() * (max + 1 - min));
        }

        function contains(where, what) {
            for (let i = 0; i < what.length; i++)
                if (~what.indexOf(where[i])) return true;
            return false;
        }


        function fib(n) {
            if (n === 1) {
                return [0, 1];
            }
            else {
                var s = fib(n - 1);
                s.push(s[s.length - 1] + s[s.length - 2]);
                return s;
            }
        };


        var n = parseInt(prompt('Введіть кількість ел. в масиві', '5'));
        var arr = [];
        var fibArr = new Array;
        fibArr = fib(11);
        document.write(fibArr + "</br>")

        for (let i = 0; i < n; i++) {
            arr[i] = getRandomArbitary(0, 100);
            document.write(arr[i] + " ");
        }
        document.write("</br>");
        document.write(contains(arr, fibArr));


    </script>
