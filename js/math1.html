    <p>Узнайте какое из 3 выражений ниже максимально, произведя
        расчет с помощью JavaScript, и выведите результат на экран: </p>

    <p>a. 34PI<sup>2</sup>+2E<sup>8</sup></p>
    <p>b. cos(2)+cos(12)+8PI<sup>3</sup></p>
    <p>c. sin(10)+15E<sup>3</sup></p>
    <p>d. 39<sup>0.5</sup>+32*PI<sup>0.5</sup>+tan(3)</p>


    <script type='text/javascript'>
        var PI = 3.14159;
        var E = 2.71828;


        var a = 34 * Math.pow(Math.PI, 2) + 2 * Math.pow(Math.E, 8);
        var b = Math.cos(2) + Math.cos(12) + 8 * Math.pow(Math.PI, 3);
        var c = Math.sin(10) + 15 * Math.pow(Math.E, 3);
        var d = 39 * Math.pow(39, 0.5) + 32 * Math.pow(Math.PI, 0.5) + Math.tan(3);

        document.write("a = " + a + "</br>");
        document.write("b = " + b + "</br>");
        document.write("c = " + c + "</br>");
        document.write("d = " + d + "</br>" + "</br>");

        var max = Math.max(a, b, c, d);


        document.write("Maximum: " + max);
    </script>
