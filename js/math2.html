    <p>Узнайте какое из 3 выражений ниже минимально, произведя
        расчет с помощью JavaScript, округлив и выведите результат на экран: </p>

    <p>a. (48/3PI+308/4E)<sup>2</sup>-203sin(5)+(10PI-3E)<sup>3</sup></p>
    <p>b. (cos(20)-cos(3)+tan(5))<sup>0.5</sup>-203/sin(2)</p>
    <p>c. (22PI/22E-sin(3)*tan(4)-34)<sup>10</sup></p>


    <script type='text/javascript'>
        var PI = 3.14159;
        var E = 2.71828;

        var a = Math.round((Math.pow((48 / 3 * Math.PI + 308 / 4 * Math.E), 2)) - 203 * Math.sin(5) + (Math.pow(10 * Math.PI - 3 * Math.E), 3));
        var b = Math.round(Math.pow(Math.cos(20) - Math.cos(3) + Math.tan(50), 0.5) - 203 / Math.sin(2));
        var c = Math.round(Math.pow(22 * Math.PI / 22 * Math.E - Math.sin(3) * Math.tan(4) - 34, 10));

        document.write("a = " + a + "</br>");
        document.write("b = " + b + "</br>");
        document.write("c = " + c + "</br>" + "</br>");

        var min = Math.min(a, b, c);

        document.write("Minimim: " + min);
    </script>
