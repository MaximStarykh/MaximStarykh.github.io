<body>

    <h1 class="reg">Registration Form</h1>
    <p class="reg">Use tab keys to move from one input field to the next.</p>
    <form name='registration' onSubmit="return formValidation();">
        <ul>
            <li><label for="usertag">Usertag:</label></li>
            <li><input type="text" name="usertag" size="12" /></li>
            <li><label for="passid">Password:</label></li>
            <li><input type="password" name="passid" size="12" /></li>
            <li><label for="username">Name:</label></li>
            <li><input type="text" name="username" size="50" /></li>

            <li><label for="region">Region:</label></li>
            <li><select name="region">
                    <option selected="" value="Default">(Please select your region)</option>
                    <option value="AF">Africa</option>
                    <option value="AS">Asia</option>
                    <option value="CA">Central America</option>
                    <option value="EE">Eastern Europe</option>
                    <option value="EU">European Union</option>
                    <option value="ME">Middle East</option>
                    <option value="NA">North America</option>
                    <option value="OC">Oceania</option>
                    <option value="SA">South America</option>
                    <option value="TC">The Caribbean</option>
                </select></li>

            <li><label for="email">Email:</label></li>
            <li><input type="text" name="email" size="50" /></li>
            <li><label id="gender">Gender:</label></li>
            <li><input type="radio" name="male" value="Male" /><span>Male</span></li>
            <li><input type="radio" name="fmale" value="Female" /><span>Female</span></li>
            <li><input type="submit" name="submit" value="Submit" /></li>
        </ul>
    </form>

    <script type='text/javascript'>

        function formValidation() { //calls all other functions used for validation

            var uregion = document.registration.region;
            var utag = document.registration.tag;
            var passid = document.registration.passid;
            var uname = document.registration.username;
            var uemail = document.registration.email;
            var umale = document.registration.male;
            var ufmale = document.registration.fmale;

            if (userid_validation(utag, 5, 12)) {
                if (passid_validation(passid, 7, 12)) {
                    if (allLetter(uname)) {
                        if (regionselect(uregion)) {
                            if (ValidateEmail(uemail)) {
                                if (validsex(umale, ufmale)) {
                                }
                            }
                        }
                    }
                }
            }
            return false;
        }

        function tag_validation(utag, mx, my) { //userid
            var utag_len = utag.value.length;
            if (utag_len == 0 || utag_len >= my || utag_len < mx) {
                alert("Username should not be empty. Length be between " + mx + " to " + my);
                utag.focus();
                return false;
            }
            return true;
        }

        function passid_validation(passid, mx, my) { //password
            var passid_len = passid.value.length;
            if (passid_len == 0 || passid_len >= my || passid_len < mx) {
                alert("Password should not be empty. Length be between " + mx + " to " + my);
                passid.focus();
                return false;
            }
            return true;
        }

        function allLetter(uname) { // user name
            var letters = /^[A-Za-z]+$/; //copypaste
            if (uname.value.match(letters)) {
                return true;
            }
            else {
                alert('Username must have alphabet characters only');
                uname.focus();
                return false;
            }
        }

        function regionselect(uregion) { //region
            if (uregion.value == "Default") {
                alert('Select your country from the list');
                uregion.focus();
                return false;
            }
            else {
                return true;
            }
        }

        function ValidateEmail(uemail) { //email format
            var mailformat = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/; //copypaste
            if (uemail.value.match(mailformat)) {
                return true;
            }
            else {
                alert("You have entered an invalid email address!");
                uemail.focus();
                return false;
            }
        }

        function validsex(umale, ufmale) { //gender
            x = 0;

            if (umale.checked) {
                x++;
            } if (ufmale.checked) {
                x++;
            }
            if (x == 0) {
                alert('Select Male/Female');
                umale.focus();
                return false;
            }
            else {
                alert('Form Succesfully Submitted');
                window.location.reload()
                return true;
            }
        }
    </script>

</body>
