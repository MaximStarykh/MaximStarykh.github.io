    <script type='text/javascript'>


        var n = parseInt(prompt('Введіть кількість стовпців', '5'));
        var m = parseInt(prompt('Введіть кількість рядків', '5'));
        var A = parseInt(prompt('Введіть нижній ліміт', '-101'));
        var B = parseInt(prompt('Введіть верхній ліміт', '101'));
        var arrMin = null;
        var arrMax = null;
        var arr = new Array()

        document.write('<h1><table align = center border = 1 ><tr><h1>')

        for (let i = 0; i < n; i++) {
            arr[i] = new Array();

            for (let j = 0; j < m; j++) {
                arr[i][j] = parseInt(Math.random() * (B - A) + A);
                document.write("<td width = 130>" + arr[i][j] + "</td>");
            }
            document.write('</tr>');

        } document.write('</table >')

        arrMax = arr[0][0];
        arrMin = arr[0][0];
        for (var i = 0; i < m; i++) {
            for (var j = 0; j < n; j++) {
                if (arr[i][j] > arrMax) {
                    arrMax = arr[i][j];
                }
                if (arr[i][j] < arrMin) {
                    arrMin = arr[i][j];
                }
            }
        }

        document.write('<p>Минимальный элемент массива: <b>' + arrMin + '</b>');
        document.write('<p>Максимальный элемент массива: <b>' + arrMax + '</b>');

    </script>
