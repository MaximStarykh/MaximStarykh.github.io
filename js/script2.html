    <script>


        var min = null;
        var max = null;
        var a = null;
        var b = null;
        var answr = null;
        var repeat = null;

        function NumberGeneration(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }


        while (repeat != 0) {
            a = NumberGeneration(0, 9);
            b = NumberGeneration(0, 9);
            alert('Скільки буде' + a + ' помножити на ' + b + '?')
            var answr = parseInt(prompt('Введіть відповідь: ', ''));
            var summ = a * b;
            do {
                if (answr == summ) {
                    alert("Молодець! Дуже добре!");
                }
                else {
                    alert("Невірно! Спробуйте знову.");
                    var answr = parseInt(prompt('Введіть відповідь:', ''));
                }
            } while (answr != summ);
            var repeat = parseInt(prompt('Бажаєте ще раз зіграти? Якщо так, то введіть 1, якщо ні то 0', '0'));
        }

    </script>
