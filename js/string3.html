    <p>Извлеките часть строки ниже выделенную жирным шрифтом сначала с
        помощью метода <b>substr()</b> затем с помощью <b>substring()</b> и
        выведите ее на страницу: </p>
    <hr />
    <p>В тайге и горах можно увидеть <b>марала, лося, белку</b>, бурундука,
        зайца. </p>
    <hr />
    <script type='text/javascript'>

        var str = 'В тайге и горах можно увидеть марала, лося, кабаргу, белку, бурундука, зайца.';

        var x1 = str.indexOf(" марала");
        var y1 = str.indexOf(" кабаргу")
        var str1 = str.substr(x1, y1 - x1);
        var x2 = str.indexOf(" белку");
        var y2 = str.indexOf(", бурундука")
        var str2 = str.substr(x2, y2 - x2);
        document.write(str1 + str2 + "</br >");

        var str3 = str.substring(x1, y1);
        var str4 = (str.substring(x2, y2));
        document.write(str3 + str4);


    </script>
